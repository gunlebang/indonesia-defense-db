function OriginChart(){
  const [expandJoint, setExpandJoint] = useState(false);

  // Determine if a system is Prabowo-era (contract/introduced 2020+)
  const isPrabowoEra = (w) => {
    const introStr = String(w.specs.introduced || "");
    const yearMatch = introStr.match(/(\d{4})/);
    if (yearMatch && parseInt(yearMatch[1]) >= 2020) return true;
    if (["On Order","Under Construction","In Development","Delivering"].includes(w.status)) {
      if (!yearMatch) return true; // TBD items are likely recent
      if (parseInt(yearMatch[1]) >= 2020) return true;
    }
    return false;
  };

  // Extract partner country name (remove Indonesia from joint names)
  const getPartner = (origin) => {
    const parts = origin.split("/").map(s => s.trim());
    const nonIndo = parts.filter(p => p !== "Indonesia");
    return nonIndo.join(" / ") || "Indonesia";
  };

  const origins = useMemo(() => {
    const pureMap = {};
    const jointIndoMap = {};
    const jointOtherMap = {};

    WEAPON_SYSTEMS.forEach(w => {
      const o = w.origin;
      const hasSlash = o.includes("/");
      const hasIndo = o.includes("Indonesia");
      const prabowo = isPrabowoEra(w);

      if (hasSlash && hasIndo) {
        // Joint with Indonesia - group by partner
        const partner = getPartner(o);
        if (!jointIndoMap[partner]) jointIndoMap[partner] = { count: 0, prabowo: 0, systems: [] };
        jointIndoMap[partner].count++;
        if (prabowo) jointIndoMap[partner].prabowo++;
        jointIndoMap[partner].systems.push(w.name);
      } else if (hasSlash && !hasIndo) {
        // Joint without Indonesia - keep as separate origin
        if (!jointOtherMap[o]) jointOtherMap[o] = { count: 0, prabowo: 0, systems: [] };
        jointOtherMap[o].count++;
        if (prabowo) jointOtherMap[o].prabowo++;
        jointOtherMap[o].systems.push(w.name);
      } else {
        if (!pureMap[o]) pureMap[o] = { count: 0, prabowo: 0, systems: [] };
        pureMap[o].count++;
        if (prabowo) pureMap[o].prabowo++;
        pureMap[o].systems.push(w.name);
      }
    });

    const result = Object.entries(pureMap).map(([n, d]) => [n, { ...d, type: "pure" }]);

    // Add Indonesia Joint Production as one grouped entry
    const jointIndoTotal = Object.values(jointIndoMap).reduce((s, v) => s + v.count, 0);
    const jointIndoPrabowo = Object.values(jointIndoMap).reduce((s, v) => s + v.prabowo, 0);
    if (jointIndoTotal > 0) {
      result.push(["Indonesia Joint Production", {
        count: jointIndoTotal, prabowo: jointIndoPrabowo, systems: [],
        type: "jointIndo",
        breakdown: Object.entries(jointIndoMap).sort((a, b) => b[1].count - a[1].count)
      }]);
    }

    // Add non-Indonesia joint as separate entries
    Object.entries(jointOtherMap).forEach(([n, d]) => {
      result.push([n, { ...d, type: "jointOther" }]);
    });

    result.sort((a, b) => b[1].count - a[1].count);
    return result;
  }, []);

  const max = origins[0] ? origins[0][1].count : 1;

  const barColor = (type) => {
    if (type === "jointIndo") return "#C8A951";
    if (type === "jointOther") return "#94a3b8";
    return GOLD;
  };

  return (
    <div style={{ marginTop: 32 }}>
      <h2 style={{ fontSize: 18, fontWeight: 800, color: "#111", marginBottom: 4 }}>Country of Origin</h2>
      <p style={{ fontSize: 12, color: "#9ca3af", marginBottom: 4 }}>Number of weapon system types by supplier nation</p>
      <div style={{ display: "flex", gap: 12, marginBottom: 16, fontSize: 10, color: "#9ca3af" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 12, height: 8, borderRadius: 2, background: GOLD, display: "inline-block" }} /> Total</span>
        <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 12, height: 8, borderRadius: 2, background: "#ef4444", display: "inline-block" }} /> Prabowo era (2020+)</span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
        {origins.map(([name, data]) => (
          <div key={name}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, cursor: data.type === "jointIndo" ? "pointer" : "default" }}
              onClick={() => data.type === "jointIndo" && setExpandJoint(!expandJoint)}>
              <div style={{ width: 170, fontSize: 11, color: data.type === "jointIndo" ? "#C8A951" : data.type === "jointOther" ? "#94a3b8" : "#374151", fontWeight: 600, textAlign: "right", flexShrink: 0 }}>
                {name}{data.type === "jointIndo" ? (expandJoint ? " ▴" : " ▾") : ""}
              </div>
              <div style={{ flex: 1, background: "#f3f4f6", borderRadius: 4, height: 22, position: "relative", overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(data.count / max) * 100}%`, background: `linear-gradient(90deg,${barColor(data.type)},${barColor(data.type)}cc)`, borderRadius: 4, transition: "width .5s" }} />
                {data.prabowo > 0 && <div style={{ position: "absolute", top: 0, left: 0, height: "100%", width: `${(data.prabowo / max) * 100}%`, background: "linear-gradient(90deg,#ef4444,#ef4444cc)", borderRadius: 4, opacity: 0.85 }} />}
              </div>
              <div style={{ width: 50, fontSize: 12, fontWeight: 700, color: "#111", textAlign: "right" }}>
                {data.count}{data.prabowo > 0 ? <span style={{ color: "#ef4444", fontSize: 10, fontWeight: 600 }}>{" "}({data.prabowo})</span> : ""}
              </div>
            </div>
            {data.type === "jointIndo" && expandJoint && data.breakdown && (
              <div style={{ marginLeft: 182, marginTop: 4, marginBottom: 6 }}>
                {data.breakdown.map(([partner, pd]) => (
                  <div key={partner} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                    <div style={{ width: 130, fontSize: 10, color: "#b08d3e", textAlign: "right", flexShrink: 0, fontWeight: 500 }}>{partner}</div>
                    <div style={{ flex: 1, background: "#f9fafb", borderRadius: 3, height: 14, overflow: "hidden", position: "relative" }}>
                      <div style={{ height: "100%", width: `${(pd.count / data.count) * 100}%`, background: "#e2d5a8", borderRadius: 3 }} />
                      {pd.prabowo > 0 && <div style={{ position: "absolute", top: 0, left: 0, height: "100%", width: `${(pd.prabowo / data.count) * 100}%`, background: "#ef9a9a", borderRadius: 3 }} />}
                    </div>
                    <div style={{ width: 30, fontSize: 10, color: "#6b7280", textAlign: "right" }}>{pd.count}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function Timeline(){
  const items=useMemo(()=>{
    return WEAPON_SYSTEMS.filter(w=>w.specs.introduced&&String(w.specs.introduced).match(/\d{4}/)).map(w=>({
      ...w,
      year:parseInt(String(w.specs.introduced).match(/\d{4}/)[0])
    })).sort((a,b)=>a.year-b.year);
  },[]);
  const decades=[1970,1980,1990,2000,2010,2020,2030];
  return(
    <div style={{marginTop:32}}>
      <h2 style={{fontSize:18,fontWeight:800,color:"#111",marginBottom:4}}>Procurement Timeline</h2>
      <p style={{fontSize:12,color:"#9ca3af",marginBottom:16}}>Year of introduction / first delivery by branch</p>
      <div style={{overflowX:"auto",paddingBottom:8}}>
        <div style={{position:"relative",minWidth:800,height:Math.max(items.length*28+60,200)}}>
          {decades.map(d=>{
            const minY=items.length?items[0].year:1970;
            const maxY=items.length?Math.max(items[items.length-1].year,2030):2030;
            const pct=((d-minY)/(maxY-minY))*100;
            return <div key={d} style={{position:"absolute",left:`${pct}%`,top:0,bottom:0,borderLeft:"1px dashed #e5e7eb",zIndex:0}}>
              <span style={{position:"absolute",top:0,left:4,fontSize:10,color:"#9ca3af",fontWeight:600}}>{d}</span>
            </div>;
          })}
          {items.map((w,i)=>{
            const minY=items[0].year;
            const maxY=Math.max(items[items.length-1].year,2030);
            const pct=((w.year-minY)/(maxY-minY))*100;
            const c=BCo[w.branch]||"#64748b";
            return <div key={w.id} style={{position:"absolute",left:`${pct}%`,top:24+i*28,display:"flex",alignItems:"center",gap:6,zIndex:1}}>
              <div style={{width:10,height:10,borderRadius:5,background:c,flexShrink:0,border:"2px solid #fff",boxShadow:"0 1px 3px rgba(0,0,0,.15)"}}/>
              <span style={{fontSize:11,color:"#374151",fontWeight:500,whiteSpace:"nowrap"}}>{w.name}</span>
              <span style={{fontSize:10,color:"#9ca3af"}}>({w.year})</span>
            </div>;
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
        {Object.entries(BCo).map(([b,c])=><div key={b} style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:5,background:c}}/><span style={{fontSize:11,color:"#6b7280"}}>{b}</span></div>)}
      </div>
    </div>
  );
}

function BaseMap() {
  const [selectedBase, setSelectedBase] = useState(null);
  const [hoveredBase, setHoveredBase] = useState(null);
  const [branchFilter, setBranchFilter] = useState("All");
  const [viewBox, setViewBox] = useState(null);
  const [zoomLevel, setZoomLevel] = useState(1);
  const [panOffset, setPanOffset] = useState([0, 0]);
  const [showRadius, setShowRadius] = useState(null); // null = off, or category string
  const [radiusCategory, setRadiusCategory] = useState("Fighters");
  const [selectedWeapon, setSelectedWeapon] = useState(null); // weapon ID clicked in detail panel

  const mapW = 960, mapH = 540;

  // D3 projection for Indonesia - zoomed out to show regional context
  const projection = useMemo(() => {
    return d3.geoMercator()
      .center([118, -4])
      .scale(1050)
      .translate([mapW / 2, mapH / 2]);
  }, []);

  // GeoJSON feature for Indonesia
  const idnFeature = useMemo(() => ({
    type: "Feature",
    properties: { name: "Indonesia" },
    geometry: { type: "MultiPolygon", coordinates: IDN_GEO }
  }), []);

  // Generate SVG path for Indonesia
  const pathGen = useMemo(() => d3.geoPath().projection(projection), [projection]);
  const idnPath = useMemo(() => pathGen(idnFeature), [pathGen, idnFeature]);

  // Neighbor country paths
  const neighborPaths = useMemo(() => {
    return Object.entries(NEIGHBORS).map(([name, polygons]) => {
      const feature = {
        type: "Feature",
        properties: { name },
        geometry: { type: "MultiPolygon", coordinates: polygons.map(ring => [ring]) }
      };
      const centroid = d3.geoCentroid(feature);
      const projected = projection(centroid);
      return { name, path: pathGen(feature), cx: projected ? projected[0] : 0, cy: projected ? projected[1] : 0 };
    });
  }, [pathGen, projection]);

  // Build base markers with aggregated system data
  const baseMarkers = useMemo(() => {
    const baseMap = {};
    WEAPON_SYSTEMS.forEach(w => {
      const bases = SYSTEM_BASES[w.id] || [];
      bases.forEach(baseName => {
        const coord = BASE_COORDS[baseName];
        if (!coord) return;
        if (!baseMap[baseName]) {
          baseMap[baseName] = {
            name: baseName,
            lat: coord[0],
            lng: coord[1],
            systems: [],
            branches: new Set(),
          };
        }
        baseMap[baseName].systems.push(w);
        baseMap[baseName].branches.add(w.branch);
      });
    });
    return Object.values(baseMap).map(b => {
      const projected = projection([b.lng, b.lat]);
      const branchArr = [...b.branches];
      return {
        ...b,
        x: projected ? projected[0] : 0,
        y: projected ? projected[1] : 0,
        primaryBranch: branchArr.length === 1 ? branchArr[0] : (branchArr.includes("TNI AL") ? "TNI AL" : branchArr[0]),
        branchArr,
      };
    });
  }, [projection]);

  const filteredMarkers = useMemo(() => {
    if (branchFilter === "All") return baseMarkers;
    return baseMarkers.filter(b => b.branchArr.includes(branchFilter));
  }, [baseMarkers, branchFilter]);

  // Unlocated systems
  // Radius category definitions
  const radiusCategories = {
    "Fighters": ["F16AM","F16CD","SU27","SU30","RAFALE","HAWK200","T50I"],
    "Missiles": ["KHAN","BORA","ASTROS","ATMACA"],
    "Air Defense": ["SKYSHIELD","NASAMS","MISTRAL","QW3","HISARO","SIPER"],
    "Radar": ["MASTERT","TRS2215","AR325","GM200"],
    "UAVs": ["ANKAS","CH4","TB2"],
    "Artillery": ["CAESAR","M109","KH179","RM70"],
    "Submarines": ["CAKRA","NAGAPASA"],
    "Combatants": ["MARTADINATA","BRAWIJAYA","AHMADYANI","DIPONEGORO","USMANHARUN","FATAHILLAH","BUNGTOMO","BUNGKARNO","MAKASSAR"],
    "Patrol Ships": ["PATTIMURA","KCR60","KCR40"],
  };

  // Compute radius circles for the selected category
  const radiusRings = useMemo(() => {
    if (!showRadius) return [];
    const sysIds = radiusCategories[showRadius] || [];
    const rings = [];
    sysIds.forEach(sysId => {
      const cr = COMBAT_RADIUS[sysId];
      if (!cr) return;
      const bases = SYSTEM_BASES[sysId] || [];
      bases.forEach(baseName => {
        const coord = BASE_COORDS[baseName];
        if (!coord) return;
        const latRad = coord[0] * Math.PI / 180;
        const kmPerDeg = 111.32 * Math.cos(latRad);
        const degRadius = cr.radius / kmPerDeg;
        const center = projection([coord[1], coord[0]]);
        const edge = projection([coord[1] + degRadius, coord[0]]);
        if (!center || !edge) return;
        const pxRadius = Math.max(Math.abs(edge[0] - center[0]), 18);
        const isMinClamped = Math.abs(edge[0] - center[0]) < 18;
        rings.push({ cx: center[0], cy: center[1], r: pxRadius, color: cr.color, label: cr.label, baseName, sysId, radiusKm: cr.radius, clamped: isMinClamped });
      });
    });
    return rings;
  }, [showRadius, projection]);

  // Single weapon radius ring (when clicking a weapon in the detail panel)
  const weaponRing = useMemo(() => {
    if (!selectedWeapon || !selectedBase) return null;
    const cr = COMBAT_RADIUS[selectedWeapon];
    if (!cr) return null;
    const coord = [selectedBase.lat, selectedBase.lng];
    const latRad = coord[0] * Math.PI / 180;
    const kmPerDeg = 111.32 * Math.cos(latRad);
    const degRadius = cr.radius / kmPerDeg;
    const center = projection([coord[1], coord[0]]);
    const edge = projection([coord[1] + degRadius, coord[0]]);
    if (!center || !edge) return null;
    const pxRadius = Math.max(Math.abs(edge[0] - center[0]), 18);
    return { cx: center[0], cy: center[1], r: pxRadius, color: cr.color, label: cr.label, radiusKm: cr.radius, clamped: Math.abs(edge[0] - center[0]) < 18 };
  }, [selectedWeapon, selectedBase, projection]);

  // Command groupings for connection lines
  const COMMAND_GROUPS = {
    "Koarmada I": ["Koarmada I, Tanjungpinang", "Lanal Ranai, Natuna"],
    "Koarmada II": ["Koarmada II, Surabaya", "PT PAL, Surabaya", "Puspenerbal, Juanda", "Brigif Marinir 1, Surabaya", "Lantamal V, Surabaya"],
    "Koarmada III": ["Koarmada III, Sorong"],
    "Koopsau I": ["Lanud Halim Perdanakusuma, Jakarta", "Lanud Roesmin Nurjadin, Pekanbaru", "Lanud Supadio, Pontianak", "Lanud Atang Sendjaja, Bogor", "Lanud Husein Sastranegara, Bandung"],
    "Koopsau II": ["Lanud Iswahjudi, Madiun", "Lanud Sultan Hasanuddin, Makassar", "Lanud Abdulrachman Saleh, Malang", "Lanud El Tari, Kupang", "Lanud Sam Ratulangi, Manado"],
    "Puspenerbad": ["Puspenerbad, Semarang", "Puspenerbad, Pondok Cabe", "Skadron 12 Penerbad, Lampung"],
  };

  // Get sibling bases under same command
  const commandSiblings = useMemo(() => {
    if (!selectedBase) return [];
    const siblings = [];
    Object.entries(COMMAND_GROUPS).forEach(([cmd, bases]) => {
      if (bases.includes(selectedBase.name)) {
        bases.forEach(bn => {
          if (bn !== selectedBase.name) {
            const coord = BASE_COORDS[bn];
            if (coord) {
              const p = projection([coord[1], coord[0]]);
              if (p) siblings.push({ name: bn, x: p[0], y: p[1], command: cmd });
            }
          }
        });
      }
    });
    return siblings;
  }, [selectedBase, projection]);

  const unlocatedSystems = useMemo(() => {
    return WEAPON_SYSTEMS.filter(w => {
      const bases = SYSTEM_BASES[w.id] || [];
      return bases.length === 0;
    });
  }, []);

  // Graticule
  const graticule = useMemo(() => {
    const g = d3.geoGraticule().step([5, 5]);
    return pathGen(g());
  }, [pathGen]);

  const sel = selectedBase;
  const hov = hoveredBase;

  return (
    <div style={{ marginTop: 32 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12, marginBottom: 16 }}>
        <div>
          <h2 style={{ fontSize: 18, fontWeight: 800, color: "#111", marginBottom: 4 }}>Deployment Map</h2>
          <p style={{ fontSize: 12, color: "#9ca3af", margin: 0 }}>
            {baseMarkers.length} installations • {WEAPON_SYSTEMS.length - unlocatedSystems.length} systems mapped • Click a base for details
          </p>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          {["All", "TNI AU", "TNI AD", "TNI AL"].map(b => (
            <button key={b} onClick={() => { setBranchFilter(b); setSelectedBase(null); }}
              style={{
                padding: "6px 14px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
                border: branchFilter === b ? "none" : "1px solid #e5e7eb",
                background: branchFilter === b ? (b === "All" ? "#111" : (BCo[b] || "#111")) : "#fff",
                color: branchFilter === b ? "#fff" : "#6b7280",
                letterSpacing: ".3px", transition: "all .15s",
              }}>{b}</button>
          ))}
        </div>
      </div>

      {/* Radius overlay controls */}
      <div style={{ background: "linear-gradient(135deg, #111827 0%, #0f172a 100%)", borderRadius: 10, padding: "12px 16px", marginBottom: 12, border: "1px solid #C8A95130", boxShadow: "0 2px 12px rgba(200,169,81,0.08)" }}>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: 11, color: "#C8A951", fontWeight: 700, marginRight: 8, letterSpacing: "1px", textTransform: "uppercase", borderRight: "2px solid #C8A95140", paddingRight: 12 }}>{"⊕"} Range Rings</span>
          {Object.keys(radiusCategories).map(cat => (
            <button key={cat} onClick={() => { setShowRadius(showRadius === cat ? null : cat); setSelectedWeapon(null); }}
              style={{
                padding: "6px 14px", borderRadius: 20, fontSize: 10, fontWeight: 700, cursor: "pointer",
                border: showRadius === cat ? "1px solid #C8A951" : "1px solid #374151",
                background: showRadius === cat ? "#C8A95120" : "#1f2937",
                color: showRadius === cat ? "#C8A951" : "#9ca3af",
                letterSpacing: ".4px", transition: "all .2s",
                boxShadow: showRadius === cat ? "0 0 8px rgba(200,169,81,0.2)" : "none",
              }}>{cat}</button>
          ))}
        </div>
        {showRadius && <div style={{ fontSize: 10, color: "#6b8bb5", marginTop: 8, paddingTop: 8, borderTop: "1px solid #1e3a5f" }}>
          Showing {radiusRings.length} range ring{radiusRings.length !== 1 ? "s" : ""} — theoretical max from basing{radiusRings.some(r => r.clamped) ? " (short-range enlarged for visibility)" : ""}
        </div>}
        {!showRadius && <div style={{ fontSize: 10, color: "#4a5568", marginTop: 6, fontStyle: "italic" }}>
          Select a category to overlay range circles on the map. Or click a weapon in a base detail panel.
        </div>}
      </div>

      <div style={{ background: "#0a1628", borderRadius: 12, overflow: "hidden", position: "relative", border: "1px solid #1e3a5f" }}>
        {/* Zoom controls */}
        <div style={{ position: "absolute", top: 12, left: 12, zIndex: 10, display: "flex", flexDirection: "column", gap: 4 }}>
          <button onClick={() => setZoomLevel(z => Math.min(z * 1.4, 15))} style={{ width: 32, height: 32, borderRadius: 6, border: "1px solid #2a5080", background: "#0d1f3c", color: "#8ba4c4", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          <button onClick={() => setZoomLevel(z => Math.max(z / 1.4, 0.5))} style={{ width: 32, height: 32, borderRadius: 6, border: "1px solid #2a5080", background: "#0d1f3c", color: "#8ba4c4", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
          <button onClick={() => { setZoomLevel(1); setPanOffset([0,0]); }} style={{ width: 32, height: 32, borderRadius: 6, border: "1px solid #2a5080", background: "#0d1f3c", color: "#8ba4c4", fontSize: 9, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>FIT</button>
        </div>
        <svg viewBox={`${(mapW - mapW/zoomLevel)/2 - panOffset[0]} ${(mapH - mapH/zoomLevel)/2 - panOffset[1]} ${mapW/zoomLevel} ${mapH/zoomLevel}`}
          style={{ width: "100%", height: "auto", display: "block", cursor: zoomLevel > 1 ? "grab" : "default", touchAction: "none" }}
          onWheel={(e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.85 : 1.18;
            setZoomLevel(z => Math.min(Math.max(z * delta, 0.5), 15));
          }}
          onMouseDown={(e) => {
            e.preventDefault();
            const startX = e.clientX, startY = e.clientY;
            const startPan = [...panOffset];
            const onMove = (ev) => {
              const dx = (ev.clientX - startX) / zoomLevel * 0.8;
              const dy = (ev.clientY - startY) / zoomLevel * 0.8;
              setPanOffset([startPan[0] + dx, startPan[1] + dy]);
            };
            const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
          }}
          onTouchStart={(e) => {
            if (e.touches.length === 1) {
              const t = e.touches[0];
              const startX = t.clientX, startY = t.clientY;
              const startPan = [...panOffset];
              const onMove = (ev) => {
                ev.preventDefault();
                const dx = (ev.touches[0].clientX - startX) / zoomLevel * 0.8;
                const dy = (ev.touches[0].clientY - startY) / zoomLevel * 0.8;
                setPanOffset([startPan[0] + dx, startPan[1] + dy]);
              };
              const onEnd = () => { window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
              window.addEventListener("touchmove", onMove, { passive: false });
              window.addEventListener("touchend", onEnd);
            } else if (e.touches.length === 2) {
              const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
              const startZoom = zoomLevel;
              const onMove = (ev) => {
                ev.preventDefault();
                if (ev.touches.length < 2) return;
                const newDist = Math.hypot(ev.touches[0].clientX - ev.touches[1].clientX, ev.touches[0].clientY - ev.touches[1].clientY);
                setZoomLevel(Math.min(Math.max(startZoom * (newDist / dist), 0.5), 15));
              };
              const onEnd = () => { window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
              window.addEventListener("touchmove", onMove, { passive: false });
              window.addEventListener("touchend", onEnd);
            }
          }}>
          {/* Ocean */}
          <defs>
            <radialGradient id="ocean" cx="50%" cy="50%" r="70%">
              <stop offset="0%" stopColor="#0d1f3c" />
              <stop offset="100%" stopColor="#060e1a" />
            </radialGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
            <filter id="dotGlow">
              <feGaussianBlur stdDeviation="2" result="blur" />
              <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
          <rect x="0" y="0" width={mapW} height={mapH} fill="url(#ocean)" />

          {/* Graticule grid */}
          <path d={graticule} fill="none" stroke="#1a2d4a" strokeWidth="0.3" strokeDasharray="2,4" />

          {/* Neighbor countries */}
          {neighborPaths.map(n => (
            <g key={n.name}>
              <path d={n.path} fill="#0e1a2e" stroke="#1a2d4a" strokeWidth="0.4" />
              <text x={n.cx} y={n.cy} textAnchor="middle" fill="#1a2d4a" fontSize="7" fontWeight="600" letterSpacing="1.5" style={{ textTransform: "uppercase" }}>{n.name}</text>
            </g>
          ))}

          {/* Indonesia landmass */}
          <path d={idnPath} fill="#162a46" stroke="#2a5080" strokeWidth="0.6" />
          <path d={idnPath} fill="none" stroke="#3a6a9f" strokeWidth="0.2" opacity="0.4" />

          {/* Radius rings overlay */}
          {radiusRings.map((ring, i) => (
            <g key={`ring-${i}`}>
              <circle cx={ring.cx} cy={ring.cy} r={ring.r} fill={ring.color} fillOpacity="0.12" stroke={ring.color} strokeWidth={ring.clamped ? "1.5" : "1.2"} strokeDasharray={ring.clamped ? "2,2" : "4,3"} opacity="0.8" />
              {!ring.clamped && <circle cx={ring.cx} cy={ring.cy} r={ring.r * 0.5} fill="none" stroke={ring.color} strokeWidth="0.4" strokeDasharray="2,4" opacity="0.3" />}
              {ring.r > 30 && <text x={ring.cx} y={ring.cy - ring.r - 4} textAnchor="middle" fill={ring.color} fontSize="7" fontWeight="600" opacity="0.8">{ring.label}</text>}
              {ring.r > 30 && <text x={ring.cx + ring.r + 3} y={ring.cy + 3} fill={ring.color} fontSize="6" opacity="0.6">{ring.radiusKm} km</text>}
              {ring.clamped && <text x={ring.cx} y={ring.cy - ring.r - 3} textAnchor="middle" fill={ring.color} fontSize="6" fontWeight="600" opacity="0.9">{ring.radiusKm} km</text>}
            </g>
          ))}

          {/* Command group connection lines */}
          {sel && commandSiblings.map((sib, i) => (
            <line key={`cmd-${i}`} x1={sel.x} y1={sel.y} x2={sib.x} y2={sib.y} stroke="#C8A951" strokeWidth="0.6" strokeDasharray="6,4" opacity="0.35" />
          ))}

          {/* Single weapon radius ring (from detail panel click) */}
          {weaponRing && (
            <g>
              <circle cx={weaponRing.cx} cy={weaponRing.cy} r={weaponRing.r} fill={weaponRing.color} fillOpacity="0.1" stroke={weaponRing.color} strokeWidth="1.5" strokeDasharray="6,3" opacity="0.9" />
              {weaponRing.r > 20 && <circle cx={weaponRing.cx} cy={weaponRing.cy} r={weaponRing.r * 0.5} fill="none" stroke={weaponRing.color} strokeWidth="0.5" strokeDasharray="2,4" opacity="0.4" />}
              <text x={weaponRing.cx} y={weaponRing.cy - weaponRing.r - 6} textAnchor="middle" fill={weaponRing.color} fontSize="8" fontWeight="700" opacity="0.95">{weaponRing.label}</text>
              <text x={weaponRing.cx + weaponRing.r + 4} y={weaponRing.cy + 3} fill={weaponRing.color} fontSize="7" opacity="0.7">{weaponRing.radiusKm} km</text>
            </g>
          )}

          {/* Base markers */}
          {filteredMarkers.map((b, i) => {
            const isSelected = sel && sel.name === b.name;
            const isHovered = hov === i;
            const c = BCo[b.primaryBranch] || "#64748b";
            const baseR = isSelected ? 8 : isHovered ? 7 : Math.min(4 + b.systems.length * 0.5, 8);
            const r = baseR / Math.sqrt(zoomLevel); // shrink dots when zoomed in
            return (
              <g key={b.name}
                onMouseEnter={() => setHoveredBase(i)}
                onMouseLeave={() => setHoveredBase(null)}
                onClick={(e) => { e.stopPropagation(); setSelectedBase(isSelected ? null : b); setSelectedWeapon(null); }}
                style={{ cursor: "pointer" }}>
                {/* Pulse ring for selected */}
                {isSelected && <circle cx={b.x} cy={b.y} r={14 / Math.sqrt(zoomLevel)} fill="none" stroke="#C8A951" strokeWidth={1.5 / Math.sqrt(zoomLevel)} opacity="0.6">
                  <animate attributeName="r" from={10 / Math.sqrt(zoomLevel)} to={20 / Math.sqrt(zoomLevel)} dur="1.5s" repeatCount="indefinite" />
                  <animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite" />
                </circle>}
                {/* Outer glow */}
                <circle cx={b.x} cy={b.y} r={r + 2 / Math.sqrt(zoomLevel)} fill={c} opacity="0.15" filter="url(#dotGlow)" />
                {/* Main dot */}
                <circle cx={b.x} cy={b.y} r={r} fill={c} stroke={isSelected ? "#C8A951" : "#fff"} strokeWidth={(isSelected ? 2.5 : 1.5) / Math.sqrt(zoomLevel)}
                  opacity={isSelected ? 1 : isHovered ? 1 : 0.85}
                  style={{ transition: "r 0.2s, opacity 0.2s" }} />
                {/* System count label */}
                {(isHovered || isSelected) && b.systems.length > 1 && (
                  <text x={b.x} y={b.y + 1} textAnchor="middle" dominantBaseline="middle"
                    fill="#fff" fontSize={8 / Math.sqrt(zoomLevel)} fontWeight="700" style={{ pointerEvents: "none" }}>
                    {b.systems.length}
                  </text>
                )}
              </g>
            );
          })}

          {/* Hover tooltip */}
          {hov !== null && !sel && (() => {
            const b = filteredMarkers[hov];
            if (!b) return null;
            const tw = Math.max(180, b.name.length * 5.5 + 30);
            const tx = b.x + 15 + tw > mapW ? b.x - tw - 15 : b.x + 15;
            const ty = Math.max(10, Math.min(b.y - 30, mapH - 70));
            return (
              <g style={{ pointerEvents: "none" }}>
                <rect x={tx} y={ty} width={tw} height={56} rx={6} fill="#0f1d32" stroke="#2a5080" strokeWidth="0.5" opacity="0.95" />
                <text x={tx + 10} y={ty + 16} fill="#C8A951" fontSize="10" fontWeight="700">{b.name.split(",")[0]}</text>
                <text x={tx + 10} y={ty + 30} fill="#8ba4c4" fontSize="9">{b.name.split(",")[1] || ""}</text>
                <text x={tx + 10} y={ty + 46} fill="#fff" fontSize="9" fontWeight="600">
                  {b.systems.length} system{b.systems.length > 1 ? "s" : ""} • {b.branchArr.join(" / ")}
                </text>
              </g>
            );
          })()}

          {/* Map labels */}
          <text x="30" y="28" fill="#1e3a5f" fontSize="9" fontWeight="600" letterSpacing="2">INDIAN OCEAN</text>
          <text x={mapW - 120} y={mapH - 15} fill="#1e3a5f" fontSize="9" fontWeight="600" letterSpacing="2">PACIFIC OCEAN</text>
        </svg>

        {/* Selected base detail panel */}
        {sel && (
          <div style={{
            position: "absolute", top: 12, right: 12, width: selectedWeapon ? 280 : 320, maxHeight: selectedWeapon ? "auto" : "calc(100% - 24px)",
            background: "linear-gradient(135deg, #0d1f3c 0%, #0a1628 100%)",
            border: "1px solid #2a5080", borderRadius: 10, overflow: "auto",
            boxShadow: "0 8px 32px rgba(0,0,0,.5)",
            transition: "width 0.2s",
          }}>
            <div style={{ padding: "12px 14px 10px", borderBottom: selectedWeapon ? "none" : "1px solid #1e3a5f" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 8, color: "#C8A951", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 2 }}>Installation</div>
                  <div style={{ fontSize: selectedWeapon ? 12 : 15, fontWeight: 800, color: "#e2e8f0", lineHeight: 1.2 }}>{sel.name.split(",")[0]}</div>
                  <div style={{ fontSize: 10, color: "#6b8bb5", marginTop: 1 }}>{sel.name.split(",").slice(1).join(",").trim()}</div>
                </div>
                <button onClick={() => { setSelectedBase(null); setSelectedWeapon(null); }}
                  style={{ background: "#1e3a5f", border: "none", color: "#8ba4c4", width: 24, height: 24, borderRadius: 12, cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center" }}>{"×"}</button>
              </div>
              {!selectedWeapon && <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                {sel.branchArr.map(br => (
                  <span key={br} style={{ padding: "2px 8px", borderRadius: 10, fontSize: 9, fontWeight: 600, background: (BCo[br] || "#64748b") + "22", color: BCo[br] || "#64748b", border: "1px solid " + (BCo[br] || "#64748b") + "44", letterSpacing: ".3px" }}>{br}</span>
                ))}
                <span style={{ padding: "2px 8px", borderRadius: 10, fontSize: 9, fontWeight: 600, background: "#C8A95122", color: "#C8A951", border: "1px solid #C8A95144" }}>{sel.systems.length} SYSTEMS</span>
              </div>}
            </div>

            {/* Compact mode: show only selected weapon */}
            {selectedWeapon && (() => {
              const w = sel.systems.find(s => s.id === selectedWeapon);
              if (!w) return null;
              const cr = COMBAT_RADIUS[w.id];
              return (
                <div style={{ padding: "8px 14px 12px" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#C8A951", marginBottom: 2 }}>{w.name}</div>
                  <div style={{ fontSize: 10, color: "#6b8bb5" }}>{w.category} — {w.subcategory}</div>
                  {cr && <div style={{ fontSize: 12, color: "#C8A951", fontWeight: 700, marginTop: 6 }}>{cr.radius} km range</div>}
                  <div style={{ display: "flex", gap: 8, marginTop: 4, fontSize: 10, color: "#4a7099" }}>
                    <span>{w.origin}</span><span>Qty: {w.quantity}</span>
                  </div>
                  <button onClick={() => setSelectedWeapon(null)}
                    style={{ marginTop: 8, padding: "4px 10px", borderRadius: 5, fontSize: 10, fontWeight: 600, cursor: "pointer", border: "1px solid #2a5080", background: "#1e3a5f", color: "#8ba4c4" }}>
                    {"← Back to all systems"}
                  </button>
                </div>
              );
            })()}

            {/* Full list mode */}
            {!selectedWeapon && <div style={{ padding: "10px 14px 14px" }}>
              {sel.systems.map(w => {
                const sc = BCo[w.branch] || "#64748b";
                const stc = SC[w.status] || "#64748b";
                const hasRange = !!COMBAT_RADIUS[w.id];
                return (
                  <div key={w.id} style={{ padding: "6px 6px", borderBottom: "1px solid #1a2d4a", cursor: hasRange ? "pointer" : "default", borderRadius: 6, margin: "0 -6px" }}
                    onClick={() => hasRange && setSelectedWeapon(w.id)}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#e2e8f0", display: "flex", alignItems: "center", gap: 6 }}>
                          {w.name}
                          {hasRange && <span style={{ fontSize: 8, color: "#4a7099", fontWeight: 500 }}>{"▶ range"}</span>}
                        </div>
                        <div style={{ fontSize: 10, color: "#6b8bb5", marginTop: 1 }}>{w.category} — {w.subcategory}</div>
                      </div>
                      <span style={{ padding: "1px 6px", borderRadius: 8, fontSize: 8, fontWeight: 600, background: stc + "22", color: stc, border: "1px solid " + stc + "44", whiteSpace: "nowrap", marginLeft: 8 }}>{w.status}</span>
                    </div>
                    <div style={{ display: "flex", gap: 12, marginTop: 3, fontSize: 10, color: "#4a7099" }}>
                      <span>{w.origin}</span>
                      <span>Qty: {w.quantity}</span>
                    </div>
                  </div>
                );
              })}
            </div>}
          </div>
        )}
      </div>

      {/* Legend + stats */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginTop: 14 }}>
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
          {Object.entries(BCo).map(([b, c]) => (
            <div key={b} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 10, height: 10, borderRadius: 5, background: c }} />
              <span style={{ fontSize: 11, color: "#6b7280" }}>{b}</span>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 10, color: "#9ca3af" }}>
          Dot size reflects system count • {unlocatedSystems.length} systems unlocated (on order / TBD)
        </div>
      </div>

      {/* Unlocated systems */}
      {unlocatedSystems.length > 0 && (
        <div style={{ marginTop: 20 }}>
          <h3 style={{ fontSize: 13, fontWeight: 700, color: "#9ca3af", marginBottom: 8, letterSpacing: ".5px", textTransform: "uppercase" }}>On Order / Base TBD ({unlocatedSystems.length})</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {unlocatedSystems.map(w => (
              <span key={w.id} style={{ padding: "4px 10px", borderRadius: 6, fontSize: 11, background: "#f3f4f6", color: "#6b7280", border: "1px solid #e5e7eb" }}>
                {w.name}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}



function App(){
  const[q,setQ]=useState("");
  const[fc,setFc]=useState("All");
  const[fb,setFb]=useState("All");
  const[fo,setFo]=useState("All");
  const[fs,setFs]=useState("All");
  const[sel,setSel]=useState(null);
  const[sf,setSf]=useState("name");
  const[sd,setSd]=useState("asc");
  const[tab,setTab]=useState("map");

  const fl=useMemo(()=>{
    let d=WEAPON_SYSTEMS.filter(w=>{
      if(fc!=="All"&&w.category!==fc)return false;
      if(fb!=="All"&&w.branch!==fb)return false;
      if(fo!=="All"&&w.origin!==fo)return false;
      if(fs!=="All"&&w.status!==fs)return false;
      if(q){const s=q.toLowerCase();return w.name.toLowerCase().includes(s)||w.category.toLowerCase().includes(s)||w.subcategory.toLowerCase().includes(s)||w.manufacturer.toLowerCase().includes(s)||w.origin.toLowerCase().includes(s)||(w.specs.note&&w.specs.note.toLowerCase().includes(s))||(w.base&&w.base.toLowerCase().includes(s))||(w.deploy&&w.deploy.toLowerCase().includes(s));}
      return true;
    });
    d.sort((a,b)=>{let va=a[sf]||"",vb=b[sf]||"";if(typeof va==="string")va=va.toLowerCase();if(typeof vb==="string")vb=vb.toLowerCase();return va<vb?(sd==="asc"?-1:1):va>vb?(sd==="asc"?1:-1):0;});
    return d;
  },[q,fc,fb,fo,fs,sf,sd]);

  const st=useMemo(()=>({t:WEAPON_SYSTEMS.length,a:WEAPON_SYSTEMS.filter(w=>w.status.includes("Active")).length,o:WEAPON_SYSTEMS.filter(w=>["On Order","Under Construction","Delivering"].includes(w.status)).length,d:WEAPON_SYSTEMS.filter(w=>w.origin.includes("Indonesia")).length}),[]);

  const ts=(f)=>{if(sf===f)setSd(x=>x==="asc"?"desc":"asc");else{setSf(f);setSd("asc");}};

  const ss={background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 14px",color:"#374151",fontSize:12,outline:"none",cursor:"pointer",flex:"1 1 140px",minWidth:120};

  return(
    <div style={{fontFamily:"'Helvetica Neue',Arial,sans-serif",background:"#fafafa",color:"#374151",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"24px 32px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:12,letterSpacing:2,color:GOLD,fontWeight:800,textTransform:"uppercase",marginBottom:4}}>Laboratorium Indonesia 2045</div>
            <h1 style={{fontSize:26,fontWeight:900,color:"#111",margin:0,letterSpacing:"-.5px",lineHeight:1.2}}>Indonesia Weapon Systems Database</h1>
            <p style={{fontSize:12,color:"#9ca3af",margin:"4px 0 0"}}>TNI Alutsista Inventory — Active, On Order & In Development — Open-source intelligence</p>
          </div>
        </div>
        {/* Stats */}
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:16}}>
          {[["Total Systems",st.t,GOLD],["Active",st.a,"#16a34a"],["On Order / Building",st.o,"#ea580c"],["Domestic / Joint",st.d,"#2563eb"]].map(([l,v,c])=>(
            <div key={l} style={{background:"#fafafa",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 14px",flex:"1 1 100px"}}>
              <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:9,color:"#9ca3af",fontWeight:600,letterSpacing:.5,textTransform:"uppercase",marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
        {/* Tabs */}
        <div style={{display:"flex",gap:4,marginTop:20}}>
          {[["map","Base Map"],["inventory","Inventory"],["timeline","Procurement Timeline"],["origins","Country of Origin"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{background:tab===k?"#111":"transparent",color:tab===k?"#fff":"#6b7280",border:"1px solid "+(tab===k?"#111":"#e5e7eb"),borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all .2s"}}>{l}</button>
          ))}
        </div>
      </div>

      {tab==="inventory"&&<>
        {/* Filters */}
        <div style={{padding:"14px 32px",background:"#fff",borderBottom:"1px solid #e5e7eb"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
            <input type="text" placeholder="Search systems, bases, deployments..." value={q} onChange={e=>setQ(e.target.value)} style={{...ss,flex:"2 1 250px",borderColor:q?GOLD:"#e5e7eb"}}/>
            <select value={fc} onChange={e=>setFc(e.target.value)} style={ss}><option value="All">All Categories</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
            <select value={fb} onChange={e=>setFb(e.target.value)} style={ss}><option value="All">All Branches</option>{BRS.map(b=><option key={b}>{b}</option>)}</select>
            <select value={fo} onChange={e=>setFo(e.target.value)} style={ss}><option value="All">All Origins</option>{ORS.map(o=><option key={o}>{o}</option>)}</select>
            <select value={fs} onChange={e=>setFs(e.target.value)} style={ss}><option value="All">All Statuses</option>{STS.map(s=><option key={s}>{s}</option>)}</select>
          </div>
          <div style={{fontSize:11,color:"#9ca3af",marginTop:8}}>Showing {fl.length} of {WEAPON_SYSTEMS.length} systems</div>
        </div>
        {/* Table */}
        <div style={{padding:"0 32px 40px"}}>
          <div style={{overflowX:"auto",background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",marginTop:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{borderBottom:"2px solid #e5e7eb"}}>
                {[["name","System"],["category","Category"],["branch","Branch"],["origin","Origin"],["quantity","Qty"],["status","Status"]].map(([f,l])=>(
                  <th key={f} onClick={()=>ts(f)} style={{padding:"14px 12px",textAlign:"left",cursor:"pointer",color:"#9ca3af",fontWeight:700,fontSize:10,letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap",userSelect:"none",background:"#fafafa"}}>
                    {l} <span style={{color:sf===f?GOLD:"#d1d5db"}}>{sf===f?(sd==="asc"?"\u2191":"\u2193"):"\u2195"}</span>
                  </th>
                ))}
              </tr></thead>
              <tbody>{fl.map(w=>(
                <tr key={w.id} onClick={()=>setSel(w)} style={{borderBottom:"1px solid #f3f4f6",cursor:"pointer",transition:"background .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#fafafa"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <td style={{padding:"12px",fontWeight:600,color:"#111"}}>
                    {w.name}
                    <div style={{fontSize:11,color:"#9ca3af",fontWeight:400,marginTop:1}}>{w.subcategory}</div>
                  </td>
                  <td style={{padding:12,color:"#6b7280"}}>{w.category}</td>
                  <td style={{padding:12}}><Badge t={w.branch} c={BCo[w.branch]||"#64748b"}/></td>
                  <td style={{padding:12,color:"#6b7280"}}>{w.origin}</td>
                  <td style={{padding:12,fontWeight:700,color:"#111"}}>{w.quantity}</td>
                  <td style={{padding:12}}><Badge t={w.status} c={SC[w.status]||"#64748b"}/></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          {fl.length===0&&<div style={{padding:60,textAlign:"center",color:"#9ca3af",fontSize:14}}>No systems match your filters.</div>}
        </div>
      </>}

      {tab==="timeline"&&<div style={{padding:"0 32px 40px"}}><Timeline/></div>}
      {tab==="origins"&&<div style={{padding:"0 32px 40px"}}><OriginChart/></div>}

      {tab==="map"&&<div style={{padding:"0 32px 40px"}}><BaseMap/></div>}

      {/* Footer */}
      <div style={{background:"#111",padding:"28px 32px",marginTop:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:13,color:GOLD,fontWeight:700,letterSpacing:1}}>Laboratorium Indonesia 2045</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:4}}>Indonesia Weapon Systems Database v0.3 — OSINT sources — Last updated: April 2026</div>
          </div>
          <div style={{fontSize:10,color:"#4b5563"}}>lab45.id</div>
        </div>
      </div>

      {sel&&<Detail s={sel} onClose={()=>setSel(null)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script></body></html>
