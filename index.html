function PTNTracker(){
  const [pillar,setPillar]=useState("overview");
  const [showMef,setShowMef]=useState(true);

  const getDbSystem=(dbId)=>{if(!dbId)return null; return WEAPON_SYSTEMS.find(w=>w.id===dbId);};

  // Delivered/operational counts for pipeline systems (ordered but not fully delivered)
  // Only count what's actually in service, not the full order book
  const DELIVERED={
    "RAFALE":3,"KAAN":0,"KF21":0,"A400M":2,"SCORPENE":0,"BRAWIJAYA":1,"RWFRIGATE":0,
    "ISTIF":0,"GARIBALDI":0,"KCR70M":0,"BRAHMOS":0,"BLACKHAWK":0,"A330MRTT":0,
    "M346FA":0,"TB2":0,"HISARO":0,"SIPER":0,"BORA":0,"NASAMS":0,"PC24":0,"PC21":0,
    "CAKIR":0,"EXOCET_SHORE":0,"FREMM":0,"MAESTRALE":0,"MOGAMI":0,
    "GARIB_HELO_T":0,"GARIB_HELO_U":0,"GM400":0,"PTPAL_AUV":0,
    "KHAN":0,"ATMACA":0,"ANKAS":0,"TB3":0,"AKINCI":0,
  };

  const getInventoryQty=(dbId)=>{
    const sys=getDbSystem(dbId);
    if(!sys)return 0;
    // If system has a known delivered count (pipeline items), use that
    if(DELIVERED.hasOwnProperty(dbId))return DELIVERED[dbId];
    const q=sys.quantity;
    if(typeof q==="number")return q;
    const qs=String(q).toLowerCase();
    if(qs.startsWith("tbd")||qs.includes("planned")||qs.includes("classified")||qs.includes("on order"))return 0;
    const m=String(q).match(/(\d+)/);
    return m?parseInt(m[1]):0;
  };

  const calcPillarStats=(items)=>{
    let total=0,fulfilled=0,pipeline=0,tracked=0;
    const pipelineStatuses=["On Order","Delivering","Under Construction","In Development","Under Procurement"];
    
    const sumDbIds=(dbId)=>{
      const ids=Array.isArray(dbId)?dbId:(dbId?[dbId]:[]);
      let inv=0,ordered=0;
      ids.forEach(id=>{
        inv+=getInventoryQty(id);
        const ws=WEAPON_SYSTEMS.find(w=>w.id===id);
        if(ws){
          const q=typeof ws.quantity==="string"?parseInt(ws.quantity)||0:ws.quantity;
          ordered+=q;
        }
      });
      return {inv,ordered};
    };
    
    items.forEach(it=>{
      if(!it.ptnQty||it.ptnQty===null)return;
      total+=it.ptnQty;
      tracked++;
      const {inv,ordered}=sumDbIds(it.dbId);
      const delivered=Math.min(inv,it.ptnQty);
      fulfilled+=delivered;
      let inPipeline=0;
      if(it.dbId){
        if(ordered>0){
          inPipeline=Math.max(0,Math.min(it.ptnQty,ordered)-delivered);
        } else if(pipelineStatuses.includes(it.status)){
          inPipeline=Math.max(0,it.ptnQty-delivered);
        }
      } else if(pipelineStatuses.includes(it.status)&&delivered===0){
        inPipeline=it.ptnQty;
      }
      pipeline+=inPipeline;
    });
    const pctFulfilled=total>0?Math.round((fulfilled/total)*100):0;
    const pctPipeline=total>0?Math.round((pipeline/total)*100):0;
    return {total,fulfilled,pipeline,tracked,pct:pctFulfilled,pctPipeline};
  };

  const pillarNarratives={
    dirga:"Since the 2023 PTN presentation, the F-15 program has collapsed (Boeing withdrew 2026) and the Mirage 2000-5 deal was cancelled. Indonesia is pivoting toward a Rafale-heavy fleet — 42 ordered, 3 delivered, with an additional 24 under LoI (total 66). 48 KAAN fifth-gen fighters ordered from Türkiye ($10B). JF-17 Block III (~40 units) under exploratory discussion with Pakistan following the May 2025 India-Pakistan clash. J-10C interest confirmed by Minister of Defense (Oct 2025). M-346FA selected as Hawk replacement. The air fleet is being restructured from the original 4-type next-gen plan to a diversified multi-source approach.",
    samudra:"The Giuseppe Garibaldi carrier acquisition (not in original PTN) represents a significant scope expansion beyond the 2023 presentation. 2 Istif-class frigates ordered from Türkiye (Jul 2025) — also not in original PTN. FREMM financing remains unresolved since the 2021 Fincantieri contract. Red White Frigate program on track (2 keels laid). Scorpène submarine construction at PT PAL marks Indonesia's first domestic submarine build. BrahMos coastal defense deal confirmed (Mar 2026, 3 batteries).",
    darat:"Harimau MMWT joint production with FNSS ramping up (100+ planned). 24 S-70L Black Hawks ordered (not in original PTN) — significant Army Aviation expansion. Bora SRBM (40 missiles) complements the Khan/Trisula launchers for the 300km strike layer. UAV/UCAV procurement has accelerated dramatically, reflecting lessons from the Ukraine and Iran conflicts — TB3 (60×) and Akıncı (9×) ordered via PT Republikorp, alongside the existing Anka-S and CH-4 fleets. The shift toward drone-centric warfare doctrine is the biggest conceptual change from the 2023 PTN presentation, which allocated only 65 UAV/UCAVs total.",
    c4isr:"GM400α radar rollout underway — 13 units on order with PT LEN as local integrator, complementing the existing 12 ReUNION radars. Thales TACTICOS CMS being integrated on Bung Tomo-class corvettes (PT LEN lead contractor). The AWACS requirement ($800M budgeted) remains unfilled — platform selection pending. Link 16/SATCOM backbone still in development phase.",
    pagar:"The Pagar Nusantara (Autonomous Coastal Fence) concept remains largely aspirational. PT PAL's KSOT autonomous submarine program has produced 8 prototypes but none are operationally deployed. The Orange Juku (smart buoys) and Green Juku (deep-water ASW drones) exist only as concepts. This is the least developed of all PTN pillars.",
  };

  const pillars=[
    {key:"dirga",...PTN_DATA.dirga,color:"#2563eb"},
    {key:"samudra",...PTN_DATA.samudra,color:"#0891b2"},
    {key:"darat",...PTN_DATA.darat,color:"#16a34a"},
    {key:"c4isr",...PTN_DATA.c4isr,color:"#7c3aed"},
    {key:"pagar",...PTN_DATA.pagar,color:"#0d9488"},
  ];

  const ss={fontSize:11,padding:"6px 14px",borderRadius:6,cursor:"pointer",fontWeight:600,border:"1px solid",transition:"all .2s"};

  return(
    <div style={{marginTop:36}}>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div style={{flex:"1 1 auto"}}>
            <h2 style={{fontSize:26,fontWeight:800,color:"#111",marginBottom:6}}>Strategic Defense Planning Tracker</h2>
            <p style={{fontSize:14,color:"#6b7280",margin:0,lineHeight:1.6}}>Prabowo's 25-year master plan (conceived 2021 as Minister of Defense). Optimum Essential Force (OEF) is the procurement framework; Perisai Trisula Nusantara / PTN (Trident Shield of the Archipelago) is the strategic architecture. Target quantities mapped against current inventory.</p>
          </div>
        </div>
        {/* Overall PTN progress bar */}
        {(()=>{
          const all=pillars.flatMap(p=>p.items);
          const stats=calcPillarStats(all);
          return(
            <div style={{marginTop:16,background:"#f3f4f6",borderRadius:12,padding:"16px 20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:14,fontWeight:700,color:"#374151"}}>Overall PTN Fulfillment</span>
                <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                  <span style={{fontSize:24,fontWeight:800,color:"#C8A951"}}>{stats.pct}%</span>
                  {stats.pctPipeline>0&&<span style={{fontSize:14,fontWeight:600,color:"#3b82f6"}}>+{stats.pctPipeline}% on order</span>}
                </div>
              </div>
              <div style={{width:"100%",height:14,background:"#e5e7eb",borderRadius:7,overflow:"hidden",display:"flex"}}>
                <div style={{width:`${stats.pct}%`,minWidth:stats.pct>0?4:0,height:"100%",background:"linear-gradient(90deg,#C8A951,#b8941f)",transition:"width .5s"}}/>
                <div style={{width:`${stats.pctPipeline}%`,height:"100%",background:"#93c5fd",transition:"width .5s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:12,color:"#9ca3af"}}>
                <div style={{display:"flex",gap:16}}>
                  <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"#C8A951",marginRight:5,verticalAlign:"middle"}}/>Delivered: {stats.fulfilled}</span>
                  <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"#60a5fa",marginRight:5,verticalAlign:"middle"}}/>On order: {stats.pipeline}</span>
                </div>
                <span>Target: {stats.total}</span>
              </div>
            </div>
          );
        })()}
      </div>

      {/* Pillar selector */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24}}>
        <button onClick={()=>setPillar("overview")} style={{...ss,padding:"8px 18px",fontSize:13,background:pillar==="overview"?"#111":"#fff",color:pillar==="overview"?"#fff":"#6b7280",borderColor:pillar==="overview"?"#111":"#e5e7eb"}}>Overview</button>
        {pillars.map(p=>(
          <button key={p.key} onClick={()=>setPillar(p.key)} style={{...ss,padding:"8px 18px",fontSize:13,background:pillar===p.key?p.color:"#fff",color:pillar===p.key?"#fff":p.color,borderColor:pillar===p.key?p.color:p.color+"40"}}>
            {p.icon} {p.label}
          </button>
        ))}
      </div>

      {pillar==="overview"&&<>
        {/* PTN Pillar Summary Cards — shown first */}
        <div style={{fontSize:18,fontWeight:700,color:"#111",marginBottom:16}}>Perisai Trisula Nusantara (PTN) — Pillar Summary</div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:28}}>
          {pillars.map(p=>{
            const stats=calcPillarStats(p.items);
            return(
              <div key={p.key} onClick={()=>setPillar(p.key)} style={{flex:"1 1 180px",background:"#fff",border:"2px solid "+p.color+"20",borderRadius:14,padding:22,cursor:"pointer",transition:"all .2s",borderLeft:`5px solid ${p.color}`}}>
                <div style={{fontSize:28,marginBottom:6}}>{p.icon}</div>
                <div style={{fontSize:15,fontWeight:700,color:"#111",marginBottom:3}}>{p.name}</div>
                <div style={{fontSize:12,color:"#9ca3af",marginBottom:14}}>{p.label}</div>
                <div style={{display:"flex",gap:10}}>
                  <div>
                    <div style={{fontSize:26,fontWeight:800,color:p.color}}>{stats.pct}%</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>delivered</div>
                    {stats.pctPipeline>0&&<div style={{fontSize:11,color:"#3b82f6",fontWeight:600}}>+{stats.pctPipeline}% ordered</div>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{height:10,background:"#f3f4f6",borderRadius:5,overflow:"hidden",marginTop:10,display:"flex"}}>
                      <div style={{height:"100%",width:`${stats.pct}%`,background:p.color,transition:"width .5s"}}/>
                      <div style={{height:"100%",width:`${stats.pctPipeline}%`,background:p.color+"50",transition:"width .5s"}}/>
                    </div>
                    <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{stats.fulfilled.toLocaleString()} delivered / {stats.pipeline.toLocaleString()} on order / {stats.total.toLocaleString()} target</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Key gaps callout */}
        <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:14,padding:22,marginBottom:28}}>
          <div style={{fontSize:14,fontWeight:700,color:"#dc2626",marginBottom:10}}>Critical Gaps — PTN vs Current Inventory</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[
              {label:"F-15 Heavy Fighters",gap:"36 units — Boeing withdrew from pursuit (2026). No replacement announced",severity:"high"},
              {label:"Red White Frigates",gap:"10 of 12 still needed (2 building)",severity:"high"},
              {label:"Tactical Submarines",gap:"3 of 7 unfilled beyond Nagapasa",severity:"med"},
              {label:"BrahMos Batteries",gap:"5 of 8 still needed",severity:"med"},
              {label:"AWACS",gap:"0 of 1 — $800M budgeted, platform TBD",severity:"high"},
              {label:"N219 Light Transport",gap:"0 of 10 — program delays at PT DI",severity:"low"},
            ].map(g=>(
              <div key={g.label} style={{flex:"1 1 180px",padding:"14px 16px",borderRadius:10,background:"#fff",border:`1px solid ${g.severity==="high"?"#fca5a5":g.severity==="med"?"#fde68a":"#d1d5db"}`}}>
                <div style={{fontSize:14,fontWeight:700,color:"#111"}}>{g.label}</div>
                <div style={{fontSize:12,color:"#6b7280",marginTop:4,lineHeight:1.5}}>{g.gap}</div>
              </div>
            ))}
          </div>
        </div>

        {/* MEF Achievement — moved to bottom */}
        <div style={{background:"#1a1a1a",borderRadius:14,padding:28,marginBottom:28}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Minimum Essential Force (MEF) — Historical Achievement</div>
              <div style={{fontSize:13,color:"#6b7280"}}>Phases I–III (2010–2024) — concluded, succeeded by OEF. Source: Kemhan Dirjen Renhan, Jun 2023</div>
            </div>
            <button onClick={()=>setShowMef(!showMef)} style={{background:"transparent",border:"1px solid #333",color:"#9ca3af",padding:"6px 16px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>{showMef?"Hide":"Show"} Detail</button>
          </div>

          {/* Phase bars */}
          <div style={{display:"flex",gap:12,marginBottom:showMef?20:0,flexWrap:"wrap"}}>
            {PTN_DATA.mef.phases.map(ph=>(
              <div key={ph.phase} style={{flex:"1 1 180px",background:"#111",borderRadius:8,padding:16}}>
                <div style={{fontSize:10,color:"#6b7280",fontWeight:600,letterSpacing:1,marginBottom:8}}>TAHAP {ph.phase} ({ph.period})</div>
                <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:8}}>
                  <span style={{fontSize:28,fontWeight:800,color:ph.achieved>=ph.target?"#22c55e":"#f97316"}}>{ph.achieved}%</span>
                  <span style={{fontSize:12,color:"#6b7280"}}>/ {ph.target}% target</span>
                </div>
                <div style={{height:6,background:"#222",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(ph.achieved/100)*100}%`,background:ph.achieved>=ph.target?"#22c55e":"#f97316",borderRadius:3,transition:"width .5s"}}/>
                </div>
                <div style={{height:6,background:"#222",borderRadius:3,overflow:"hidden",marginTop:2}}>
                  <div style={{height:"100%",width:`${(ph.target/100)*100}%`,background:"#333",borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>

          {showMef&&<div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {PTN_DATA.mef.byBranch.map(br=>(
              <div key={br.branch} style={{flex:"1 1 220px",background:"#111",borderRadius:8,padding:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <Badge t={br.branch} c={BCo[br.branch]||"#64748b"}/>
                  <span style={{fontSize:18,fontWeight:800,color:br.overall>=70?"#22c55e":br.overall>=50?"#f97316":"#ef4444"}}>{br.overall}%</span>
                </div>
                {br.breakdown.map(bd=>(
                  <div key={bd.cat} style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#9ca3af",marginBottom:2}}>
                      <span>{bd.cat}</span>
                      <span style={{fontWeight:700,color:bd.pct>=80?"#22c55e":bd.pct>=50?"#f97316":"#ef4444"}}>{bd.pct}%</span>
                    </div>
                    <div style={{height:4,background:"#222",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(bd.pct,100)}%`,background:bd.pct>=80?"#22c55e":bd.pct>=50?"#f97316":"#ef4444",borderRadius:2}}/>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>}
        </div>
      </>}

      {/* Pillar Detail View */}
      {pillar!=="overview"&&(()=>{
        const p=pillars.find(x=>x.key===pillar);
        if(!p)return null;
        const data=PTN_DATA[pillar];
        return(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
              <span style={{fontSize:40}}>{p.icon}</span>
              <div>
                <div style={{fontSize:22,fontWeight:800,color:"#111"}}>{data.name}</div>
                <div style={{fontSize:14,color:"#9ca3af"}}>{data.label}</div>
              </div>
            </div>

            {/* Pillar narrative — key developments since 2023 */}
            {pillarNarratives[pillar]&&<div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:"16px 20px",marginBottom:24,fontSize:14,color:"#0c4a6e",lineHeight:1.8}}>
              <strong style={{color:"#0369a1"}}>Key developments:</strong> {pillarNarratives[pillar]}
            </div>}

            {/* Items table */}
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
                <thead>
                  <tr style={{borderBottom:"2px solid #e5e7eb"}}>
                    {["System","PTN Target","In Database","Gap","Status","Origin","Notes"].map(h=>(
                      <th key={h} style={{padding:"12px 14px",textAlign:"left",fontSize:11,color:"#9ca3af",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {data.items.map((it,i)=>{
                    const dbIds=Array.isArray(it.dbId)?it.dbId:(it.dbId?[it.dbId]:[]);
                    const dbSys=dbIds.length>0?getDbSystem(dbIds[0]):null;
                    const inv=dbIds.reduce((s,id)=>s+getInventoryQty(id),0);
                    const target=it.ptnQty||0;
                    const gap=target>0?Math.max(0,target-inv):null;
                    const pct=target>0?Math.min(100,Math.round((inv/target)*100)):null;
                    return(
                      <tr key={i} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa"}}>
                        <td style={{padding:"12px 14px",fontWeight:600,color:"#111",fontSize:14}}>
                          {it.system}
                          {dbSys&&<span style={{fontSize:10,color:p.color,marginLeft:6,background:p.color+"15",padding:"2px 6px",borderRadius:4}}>in inventory</span>}
                        </td>
                        <td style={{padding:"12px 14px",fontWeight:800,color:p.color,fontSize:16}}>{target>0?target.toLocaleString():"—"}</td>
                        <td style={{padding:"12px 14px"}}>
                          {dbSys?<span style={{fontWeight:700,color:"#111",fontSize:14}}>{inv.toLocaleString()}</span>:<span style={{color:"#d1d5db"}}>—</span>}
                          {pct!==null&&<div style={{height:4,background:"#f3f4f6",borderRadius:2,marginTop:5,width:70}}>
                            <div style={{height:"100%",width:`${pct}%`,background:pct>=80?"#22c55e":pct>=50?"#f97316":"#ef4444",borderRadius:2}}/>
                          </div>}
                        </td>
                        <td style={{padding:"12px 14px",fontWeight:700,fontSize:14,color:gap===0?"#22c55e":gap===null?"#d1d5db":"#ef4444"}}>{gap!==null?(gap===0?"✓ Met":"-"+gap.toLocaleString()):"—"}</td>
                        <td style={{padding:"12px 14px"}}><Badge t={it.status} c={SC[it.status]||"#64748b"}/></td>
                        <td style={{padding:"12px 14px",color:"#6b7280",fontSize:13}}>{it.origin}</td>
                        <td style={{padding:"12px 14px",color:"#9ca3af",fontSize:12,maxWidth:240}}>{it.note||"—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function App(){
  const[q,setQ]=useState("");
  const[fc,setFc]=useState("All");
  const[fb,setFb]=useState("All");
  const[fo,setFo]=useState("All");
  const[fs,setFs]=useState("All");
  const[fCond,setFCond]=useState("All");
  const[sel,setSel]=useState(null);
  const[sf,setSf]=useState("name");
  const[sd,setSd]=useState("asc");
  const[tab,setTab]=useState("ptn");

  const fl=useMemo(()=>{
    let d=WEAPON_SYSTEMS.filter(w=>{
      if(fc!=="All"&&w.category!==fc)return false;
      if(fb!=="All"&&w.branch!==fb)return false;
      if(fo!=="All"&&w.origin!==fo)return false;
      if(fs!=="All"&&w.status!==fs)return false;
      if(fCond!=="All"&&getCondition(w)!==fCond)return false;
      if(q){const s=q.toLowerCase();return w.name.toLowerCase().includes(s)||w.category.toLowerCase().includes(s)||w.subcategory.toLowerCase().includes(s)||w.manufacturer.toLowerCase().includes(s)||w.origin.toLowerCase().includes(s)||(w.specs.note&&w.specs.note.toLowerCase().includes(s))||(w.base&&w.base.toLowerCase().includes(s))||(w.deploy&&w.deploy.toLowerCase().includes(s));}
      return true;
    });
    d.sort((a,b)=>{let va=a[sf]||"",vb=b[sf]||"";if(sf==="ordered"){va=ORDER_YEARS[a.id]||9999;vb=ORDER_YEARS[b.id]||9999;return sd==="asc"?va-vb:vb-va;}if(sf==="delivered"){const ma=String(a.specs.introduced||"").match(/(\d{4})/);const mb=String(b.specs.introduced||"").match(/(\d{4})/);va=ma?parseInt(ma[1]):9999;vb=mb?parseInt(mb[1]):9999;return sd==="asc"?va-vb:vb-va;}if(typeof va==="string")va=va.toLowerCase();if(typeof vb==="string")vb=vb.toLowerCase();return va<vb?(sd==="asc"?-1:1):va>vb?(sd==="asc"?1:-1):0;});
    return d;
  },[q,fc,fb,fo,fs,fCond,sf,sd]);

  const st=useMemo(()=>{
    const aging = WEAPON_SYSTEMS.filter(w=>w.status.includes("aging")).length;
    const onOrder = WEAPON_SYSTEMS.filter(w=>["On Order","Under Construction","Delivering","In Development"].includes(w.status)).length;
    const prabowoEra = WEAPON_SYSTEMS.filter(w=>{
      const introStr = String(w.specs.introduced || "");
      const m = introStr.match(/(\d{4})/);
      if (m && parseInt(m[1]) >= 2020) return true;
      if (["On Order","Under Construction","In Development","Delivering"].includes(w.status) && (!m || parseInt(m[1]) >= 2020)) return true;
      return false;
    }).length;
    let knownValue = 0;
    Object.values(CONTRACT_VALUES).forEach(cv => {
      const m = cv.match(/\$([\.\d]+)B/);
      if (m) knownValue += parseFloat(m[1]);
    });
    const suppliers = new Set(WEAPON_SYSTEMS.map(w => w.origin.split("/")[0].trim())).size;
    return { t: WEAPON_SYSTEMS.length, aging, onOrder, prabowoEra, knownValue, suppliers };
  },[]);

  const ts=(f)=>{if(sf===f)setSd(x=>x==="asc"?"desc":"asc");else{setSf(f);setSd("asc");}};

  const ss={background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 14px",color:"#374151",fontSize:12,outline:"none",cursor:"pointer",flex:"1 1 140px",minWidth:120};

  return(
    <div style={{fontFamily:"'DM Sans','Helvetica Neue',Arial,sans-serif",background:"#fafafa",color:"#374151",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"#1a1a1a",borderBottom:"1px solid #333",padding:"32px 32px 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:13,letterSpacing:3,color:GOLD,fontWeight:800,textTransform:"uppercase",marginBottom:6}}>Laboratorium Indonesia 2045</div>
            <h1 style={{fontSize:32,fontWeight:900,color:"#fff",margin:0,letterSpacing:"-.5px",lineHeight:1.2}}>Indonesia Weapon Systems Database</h1>
          </div>
          <div style={{fontSize:11,color:"#999",textAlign:"right"}}>
            <div style={{fontWeight:700,color:"#999"}}>Last updated</div>
            <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>April 2026</div>
          </div>
        </div>
        {/* Narrative stats */}
        <p style={{fontSize:14,color:"rgba(255,255,255,0.5)",margin:"16px 0 0",lineHeight:1.8}}>
          Tracking <span style={{color:"#C8A951",fontWeight:700}}>{st.t} weapon systems</span> across TNI's three branches — <span style={{color:"rgba(255,255,255,0.75)",fontWeight:600}}>{st.onOrder} on order or building</span>, <span style={{color:"rgba(255,255,255,0.75)",fontWeight:600}}>{st.aging} aging (≥25 yrs)</span>, <span style={{color:"rgba(255,255,255,0.75)",fontWeight:600}}>{st.prabowoEra} acquired in the Prabowo era (2020+)</span> — sourced from <span style={{color:"rgba(255,255,255,0.75)",fontWeight:600}}>{st.suppliers} supplier nations</span>. <span style={{color:"rgba(255,255,255,0.35)",fontSize:12}}>See the <span onClick={()=>setTab("about")} style={{color:"rgba(255,255,255,0.5)",cursor:"pointer",textDecoration:"underline",textUnderlineOffset:2}}>About</span> tab for full methodology & sources.</span>
        </p>
        {/* Tabs */}
        <div style={{display:"flex",gap:8,marginTop:24,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:8,paddingTop:4}}>
          {[["ptn","Strategic Planning Tracker"],["inventory","Inventory"],["origins","Country of Origin"],["map","Base Map"],["timeline","Procurement Timeline"],["a2ad","Strategic Environment"],["about","About"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{background:tab===k?GOLD:"transparent",color:tab===k?"#fff":"rgba(255,255,255,0.6)",border:"1px solid "+(tab===k?GOLD:"rgba(255,255,255,0.15)"),borderRadius:8,padding:"12px 24px",cursor:"pointer",fontSize:14,fontWeight:600,transition:"all .2s",position:"relative",whiteSpace:"nowrap",flexShrink:0}}>
              {l}
              {k==="a2ad"&&<span style={{position:"absolute",top:-6,right:-6,background:"#ef4444",color:"#fff",fontSize:8,fontWeight:800,padding:"2px 5px",borderRadius:8,lineHeight:1,letterSpacing:.5}}>BETA</span>}
            </button>
          ))}
        </div>
      </div>

      {tab==="inventory"&&<>
        {/* Filters */}
        <div style={{padding:"18px 24px",background:"#fff",borderBottom:"1px solid #e5e7eb"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
            <input type="text" placeholder="Search systems, bases, deployments..." value={q} onChange={e=>setQ(e.target.value)} style={{...ss,flex:"2 1 250px",borderColor:q?GOLD:"#e5e7eb"}}/>
            <select value={fc} onChange={e=>setFc(e.target.value)} style={ss}><option value="All">All Categories</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
            <select value={fb} onChange={e=>setFb(e.target.value)} style={ss}><option value="All">All Branches</option>{BRS.map(b=><option key={b}>{b}</option>)}</select>
            <select value={fo} onChange={e=>setFo(e.target.value)} style={ss}><option value="All">All Origins</option>{ORS.map(o=><option key={o}>{o}</option>)}</select>
            <select value={fs} onChange={e=>setFs(e.target.value)} style={ss}><option value="All">All Statuses</option>{STS.map(s=><option key={s}>{s}</option>)}</select>
            <select value={fCond} onChange={e=>setFCond(e.target.value)} style={ss}><option value="All">All Conditions</option>{CONDS.map(c=><option key={c}>{c}</option>)}</select>
          </div>
          <div style={{fontSize:11,color:"#9ca3af",marginTop:8}}>Showing {fl.length} of {WEAPON_SYSTEMS.length} systems</div>
        </div>
        {/* Table */}
        <div style={{padding:"0 32px 48px"}}>
          <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",marginTop:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:14,minWidth:900}}>
              <thead><tr style={{borderBottom:"2px solid #e5e7eb"}}>
                {[["name","System"],["category","Category"],["branch","Branch"],["origin","Origin"],["quantity","Qty"],["status","Status"],["condition","Condition"],["ordered","Ordered"],["delivered","Delivered"]].map(([f,l])=>(
                  <th key={f} onClick={()=>ts(f)} style={{padding:"16px 14px",textAlign:"left",cursor:"pointer",color:"#9ca3af",fontWeight:700,fontSize:12,letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap",userSelect:"none",background:"#fafafa"}}>
                    {l} <span style={{color:sf===f?GOLD:"#d1d5db"}}>{sf===f?(sd==="asc"?"↑":"↓"):"↕"}</span>
                  </th>
                ))}
              </tr></thead>
              <tbody>{fl.map(w=>{
                const cond=getCondition(w);
                const ordYr=ORDER_YEARS[w.id];
                const introStr=String(w.specs.introduced||"");
                const delMatch=introStr.match(/(\d{4})/);
                const delYr=delMatch?delMatch[1]:null;
                return(
                <tr key={w.id} onClick={()=>setSel(w)} style={{borderBottom:"1px solid #f3f4f6",cursor:"pointer",transition:"background .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#fafafa"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <td style={{padding:"14px",fontWeight:600,color:"#111",fontSize:14}}>
                    {w.name}
                    <div style={{fontSize:12,color:"#9ca3af",fontWeight:400,marginTop:2}}>{w.subcategory}</div>
                  </td>
                  <td style={{padding:14,color:"#6b7280"}}>{w.category}</td>
                  <td style={{padding:14}}><Badge t={w.branch} c={BCo[w.branch]||"#64748b"}/></td>
                  <td style={{padding:14,color:"#6b7280"}}>{w.origin}</td>
                  <td style={{padding:14,fontWeight:700,color:"#111"}}>{w.quantity}</td>
                  <td style={{padding:14}}><Badge t={w.status} c={SC[w.status]||"#64748b"}/></td>
                  <td style={{padding:14}}><Badge t={cond} c={COND_COLORS[cond]||"#64748b"}/></td>
                  <td style={{padding:14,fontSize:13,fontWeight:600,color:ordYr?"#111":"#d1d5db"}}>{ordYr||"—"}</td>
                  <td style={{padding:14,fontSize:13,fontWeight:600,color:delYr?"#111":"#d1d5db"}}>{delYr||introStr||"—"}</td>
                </tr>
                );
              })}</tbody>
            </table>
          </div>
          {fl.length===0&&<div style={{padding:60,textAlign:"center",color:"#9ca3af",fontSize:16}}>No systems match your filters.</div>}
        </div>
      </>}

      {tab==="timeline"&&<div style={{padding:"0 32px 48px"}}><Timeline/></div>}
      {tab==="origins"&&<div style={{padding:"0 32px 48px"}}><OriginChart/></div>}

      {tab==="map"&&<div style={{padding:"0 32px 48px"}}><BaseMap/></div>}

      {tab==="a2ad"&&<div style={{padding:"0 32px 48px"}}><A2ADView/></div>}

      {tab==="ptn"&&<div style={{padding:"0 32px 48px"}}><PTNTracker/></div>}

      {tab==="about"&&<div style={{padding:"0 32px 48px",maxWidth:1000,margin:"0 auto"}}>
        <div style={{marginTop:36}}>
          <h2 style={{fontSize:28,fontWeight:800,color:"#111",marginBottom:20}}>About This Tracker</h2>

          <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:28,marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:10}}>What is this?</div>
            <p style={{fontSize:15,color:"#374151",lineHeight:1.8,margin:0}}>
              The Indonesia Weapon Systems Database is an open-source intelligence (OSINT) tracker maintained by LAB45 (Laboratorium Indonesia 2045). It maps the Indonesian military's (TNI) current inventory, procurement pipeline, supplier relationships, and strategic defense planning across {WEAPON_SYSTEMS.length} weapon systems sourced from {(() => {const s=new Set(); WEAPON_SYSTEMS.forEach(w => w.origin.split("/").forEach(o => {const t=o.trim(); if(t!=="Indonesia"&&t!=="TBD") s.add(t);})); return s.size;})()}+ supplier nations.
            </p>
          </div>

          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:28,marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:10}}>Understanding the Frameworks</div>
            <p style={{fontSize:15,color:"#374151",lineHeight:1.8,marginBottom:12}}>
              Indonesia's defense buildup operates through two overlapping but distinct frameworks:
            </p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(320px,100%),1fr))",gap:12,marginBottom:12}}>
              <div style={{background:"#fffbeb",borderRadius:8,padding:"14px 16px",border:"1px solid #fde68a"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#92400e",marginBottom:6}}>PTN — Perisai Trisula Nusantara</div>
                <div style={{fontSize:12,color:"#92400e",lineHeight:1.7}}>The strategic architecture — Prabowo's 25-year vision for three-domain defense integration (air, land, sea shields under unified C4ISR). First mentioned in a <a href="https://rsis.edu.sg/rsis-publication/idss/ip23040-indonesias-ministry-of-defence-25-years-after-reformasi/" target="_blank" rel="noopener" style={{color:"#92400e",fontWeight:700}}>2021 DPR hearing</a>; first presented in detail at <a href="https://www.youtube.com/watch?v=ncc37dmKsXQ" target="_blank" rel="noopener" style={{color:"#92400e",fontWeight:700}}>Sespim Lemdiklat Polri, Lembang, 16 June 2023</a>. Estimated at <a href="https://rsis.edu.sg/rsis-publication/idss/ip25059-an-early-assessment-of-indonesias-defence-policy-under-prabowo-stylistic-changes-directional-continuity/" target="_blank" rel="noopener" style={{color:"#92400e",fontWeight:700}}>~US$125B over 25 years (RSIS)</a>.</div>
              </div>
              <div style={{background:"#eff6ff",borderRadius:8,padding:"14px 16px",border:"1px solid #bfdbfe"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1e40af",marginBottom:6}}>OEF — Optimum Essential Force</div>
                <div style={{fontSize:12,color:"#1e40af",lineHeight:1.7}}>The procurement mechanism that succeeded MEF (2010–2024). Codified in the RPJMN 2025–2029 (Perpres 12/2025). Translates strategic ambitions into 5-year Renstra cycles and foreign loan ceilings ($28B PLN for phase one). Kemenko Polkam (June 2025) called for "sinkronisasi" between OEF and PTN.</div>
              </div>
            </div>
            <p style={{fontSize:12,color:"#6b7280",lineHeight:1.7,margin:0}}>
              No public document maps PTN capability targets to specific OEF procurement items. The Kemhan Dirjen Strahan describes three phases — MEF (2010–2019), Essential Force (2019–2024), and OEF (2025–2044) — but "Essential Force" has never been publicly defined. This tracker attempts to reconstruct the bridge between these frameworks from open sources.
            </p>
          </div>

          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:28,marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:10}}>Data Sources & Methodology</div>
            <div style={{fontSize:15,color:"#374151",lineHeight:1.8}}>
              <p style={{marginBottom:12}}><strong>Primary source:</strong> PTN target quantities are based on Prabowo's June 2023 Sespim Lemdiklat Polri presentation. Where discrepancies exist between sources, the Prabowo speech figures take precedence.</p>
              <p style={{marginBottom:12}}><strong>Inventory data:</strong> Cross-referenced against IISS Military Balance 2025/2026, SIPRI Arms Transfers Database, and defense media reporting.</p>
              <p style={{marginBottom:12}}><strong>Procurement pipeline:</strong> Contract dates, values, and delivery status drawn from SIPRI, Janes, defense media (Indonesia Defense, Alert 5, Defense Mirror), official Kemhan/TNI announcements, and OSINT.</p>
              <p style={{marginBottom:12}}><strong>Delivered vs. ordered:</strong> The tracker distinguishes between systems actually delivered and operational vs. those still in the procurement pipeline. Only delivered units count toward the solid PTN fulfillment percentage. The striped "on order" bar includes systems at all pipeline stages.</p>
              <p style={{marginBottom:12}}><strong>PTN fulfillment calculation:</strong> Each PTN pillar item has a target quantity (from Prabowo's 2023 speech) and a current status. The <strong>delivered percentage</strong> counts only systems that have been physically received and are operationally available to TNI. The <strong>on-order percentage</strong> counts systems with signed contracts or active procurement programs that have not yet been delivered — this includes systems currently being manufactured, under construction at shipyards, or in advanced development with committed funding. Cancelled programs and items mentioned in the PTN speech but with no procurement action ("PTN Target Only") contribute zero to both — they appear only as unfilled gap. Where a single PTN line item covers multiple weapon systems (e.g. "UAV/UCAV Systems" encompasses Anka-S, TB2, TB3, Akıncı, and CH-4), delivered and ordered quantities are summed across all related platforms. The gap represents the difference between Prabowo's stated target and what has been either delivered or contractually committed.</p>
              <p style={{marginBottom:12}}><strong>Status definitions:</strong></p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(220px,100%),1fr))",gap:6,marginBottom:12}}>
                {[["Active","Operationally delivered and in service","#16a34a"],["Active (aging)","In service but 25+ years old","#ca8a04"],["Delivering","First units arriving, rest in pipeline","#2563eb"],["On Order","Contract signed, delivery pending","#ea580c"],["Under Construction","Physically being built (primarily ships)","#9333ea"],["In Development","Still being designed or tested","#64748b"],["Under Procurement","Budget allocated, no final contract","#d97706"],["Under Negotiation","Discussions ongoing","#ec4899"],["Cancelled","Program terminated","#ef4444"],["PTN Target Only","Mentioned in PTN but no procurement action","#9ca3af"]].map(([status,desc,c])=>(
                  <div key={status} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:"#f9fafb",borderRadius:6,border:"1px solid #f3f4f6"}}>
                    <span style={{flexShrink:0,marginTop:2,width:8,height:8,borderRadius:4,background:c}}/>
                    <div><span style={{fontSize:11,fontWeight:700,color:"#111"}}>{status}</span><span style={{fontSize:11,color:"#6b7280"}}> — {desc}</span></div>
                  </div>
                ))}
              </div>
              <p style={{margin:0}}><strong>Limitations:</strong> The Indonesian government has not released a detailed PTN or OEF procurement plan. All target figures should be treated as analytical estimates, not confirmed government targets. Some items (e.g. mortars, classified missile deliveries) have unknown inventory counts — these show as zero delivered, which likely understates actual fulfillment. This tracker is updated periodically and may not reflect the most recent developments.</p>
            </div>
          </div>

          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:28,marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:10}}>Map Markers</div>
            <div style={{fontSize:14,color:"#374151",lineHeight:1.8}}>
              <p style={{marginBottom:12}}>The Base Map and Strategic Environment (A2/AD) map use the following overlay markers:</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(280px,100%),1fr))",gap:8,marginBottom:12}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px",background:"#fef2f2",borderRadius:8,border:"1px solid #fecaca"}}>
                  <span style={{fontSize:20,flexShrink:0}}>{"\uD83D\uDCA5"}</span>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#991b1b"}}>Potential Flashpoints</div><div style={{fontSize:12,color:"#991b1b",opacity:0.8}}>Regions of elevated strategic tension or where military incidents are plausible. Based on IISS regional assessments.</div></div>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px",background:"#fffbeb",borderRadius:8,border:"1px solid #fde68a"}}>
                  <span style={{fontSize:20,flexShrink:0}}>{"\u2694\uFE0F"}</span>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#92400e"}}>Historical Border Disputes</div><div style={{fontSize:12,color:"#92400e",opacity:0.8}}>Locations of past or ongoing territorial/maritime disputes with neighboring states: North Natuna Sea (China), Ambalat (Malaysia), Sipadan & Ligitan (Malaysia, ICJ 2002).</div></div>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px",background:"#fff7ed",borderRadius:8,border:"1px solid #fed7aa"}}>
                  <span style={{fontSize:20,flexShrink:0}}>{"\u26CF\uFE0F"}</span>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#9a3412"}}>Mining Sites (Amphibious-Vulnerable)</div><div style={{fontSize:12,color:"#9a3412",opacity:0.8}}>Key mining regions with coastal topography favorable for amphibious landing operations. Assessed for beach gradient, surf zone, and vehicle trafficability. Commodities: tin (Bangka Belitung), bauxite (Bintan, Ketapang), nickel (Halmahera, Kolaka).</div></div>
                </div>
              </div>
            </div>
          </div>

          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:28,marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:10}}>Key Timeline</div>
            <div style={{fontSize:14,color:"#374151",lineHeight:2}}>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>2010–2024</span>
                <span style={{color:"#6b7280"}}>Minimum Essential Force (MEF) — three phases, achieved <a href="https://eastasiaforum.org/2025/04/05/indonesias-defence-strategy-is-in-urgent-need-of-a-refresh/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>~65% of target</a> by conclusion (<a href="https://thediplomat.com/2022/06/indonesian-military-modernization-a-race-against-time/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>The Diplomat</a>)</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>2019–2024</span>
                <span style={{color:"#6b7280"}}>Essential Force — transition period under Prabowo as Minister of Defense (<a href="https://www.foreignpolicytalks.com/post/indonesia-s-arms-diversification-is-inevitable-but-the-approach-must-prudent" target="_blank" rel="noopener" style={{color:"#2563eb"}}>Foreign Policy Talks</a>)</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>2021</span>
                <span style={{color:"#6b7280"}}>PTN first mentioned by name in DPR hearing (<a href="https://rsis.edu.sg/rsis-publication/idss/ip23040-indonesias-ministry-of-defence-25-years-after-reformasi/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>RSIS IP23040</a>)</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>16 Jun 2023</span>
                <span style={{color:"#6b7280"}}>PTN presented in detail at Sespim Lemdiklat Polri dialogue, Lembang (<a href="https://www.youtube.com/watch?v=ncc37dmKsXQ" target="_blank" rel="noopener" style={{color:"#2563eb"}}>YouTube</a>)</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>25 Nov 2024</span>
                <span style={{color:"#6b7280"}}>Minister of Defense Sjamsoeddin confirms PTN retained as framework in <a href="https://beritanasional.com/detail/87347/raker-dengan-dpr-menhan-sjafrie-bakal-perkuat-perisai-trisula-nusantara-laboratorium-pertahanan-nasional" target="_blank" rel="noopener" style={{color:"#2563eb"}}>Komisi I DPR hearing</a></span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>2025–2044</span>
                <span style={{color:"#6b7280"}}>Optimum Essential Force (OEF) — codified in <a href="https://eastasiaforum.org/2025/04/05/indonesias-defence-strategy-is-in-urgent-need-of-a-refresh/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>RPJMN (Perpres 12/2025)</a>, $28B PLN for phase one</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>Jun 2025</span>
                <span style={{color:"#6b7280"}}>Kemenko Polkam links OEF to PTN, sets 30.3% target for 2025 and 100% by 2029 (<a href="https://polkam.go.id/penguatan-postur-pertahanan-dengan-konsep-optimum-essential-force/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>Kemenko Polkam</a> · <a href="https://www.antaranews.com/berita/5210977/kemenko-polkam-bahas-rencana-peningkatan-tni-ad-al-dan-au" target="_blank" rel="noopener" style={{color:"#2563eb"}}>ANTARA</a>)</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:4}}>
                <span style={{minWidth:110,fontWeight:700,color:"#111",flexShrink:0}}>Est. cost</span>
                <span style={{color:"#6b7280"}}>~US$125B over 25 years (<a href="https://rsis.edu.sg/rsis-publication/idss/ip25059-an-early-assessment-of-indonesias-defence-policy-under-prabowo-stylistic-changes-directional-continuity/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>RSIS IP25059</a>)</span>
              </div>
            </div>
          </div>

          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:28,marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:10}}>RPJPN Defense Phases (UU 59/2024)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(200px,100%),1fr))",gap:8}}>
              {[
                ["Phase I","2025–2029","Island & maritime-oriented defense buildup, supported by healthy defense industry","#2563eb"],
                ["Phase II","2030–2034","Cross-domain posture adopting \"game changer\" technology, defense industry in global supply chain","#7c3aed"],
                ["Phase III","2035–2039","Regional deterrence posture, defense industry in global top 50","#dc2626"],
                ["Phase IV","2040–2045","Full \"pertahanan berdaya gentar kawasan\" — regional deterrence capability","#111"],
              ].map(([phase,period,desc,c])=>(
                <div key={phase} style={{padding:"12px 14px",borderRadius:8,borderLeft:`4px solid ${c}`,background:"#f9fafb"}}>
                  <div style={{fontSize:12,fontWeight:800,color:c}}>{phase} ({period})</div>
                  <div style={{fontSize:11,color:"#6b7280",marginTop:4,lineHeight:1.6}}>{desc}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{background:"#f9fafb",borderRadius:12,border:"1px solid #e5e7eb",padding:16,textAlign:"center"}}>
            <div style={{fontSize:11,color:"#9ca3af"}}>Open-source intelligence. See footer for version info.</div>
          </div>
        </div>
      </div>}

      {/* Footer */}
      <div style={{background:"#1a1a1a",padding:"32px 32px",marginTop:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:14,color:GOLD,fontWeight:700,letterSpacing:1}}>Laboratorium Indonesia 2045</div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Indonesia Weapon Systems Database v0.5.1 — OSINT sources — Last updated: April 2026</div>
          </div>
          <div style={{fontSize:10,color:"#4b5563"}}>lab45.id</div>
        </div>
      </div>

      {sel&&<Detail s={sel} onClose={()=>setSel(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
