          {selectedAC&&<>
            <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>2. Select Base <span style={{textTransform:"none",fontWeight:400,letterSpacing:0}}>— showing {eligibleBases.length} eligible bases for {selectedAC.name}</span></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(300px,100%),1fr))",gap:6,marginBottom:16}}>
              {eligibleBases.map(b=>{
                const isSel=plannerBase===b.name;
                return(
                  <div key={b.name} onClick={()=>setPlannerBase(isSel?null:b.name)} style={{padding:"10px 12px",borderRadius:8,cursor:"pointer",background:isSel?"rgba(245,158,11,0.15)":b.tollRoad?"rgba(16,185,129,0.08)":"rgba(255,255,255,0.05)",border:`1px solid ${isSel?"#f59e0b":b.tollRoad?"rgba(16,185,129,0.3)":"rgba(255,255,255,0.1)"}`,transition:"all .2s",opacity:b.planned?0.5:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:13,fontWeight:600,color:isSel?"#f59e0b":b.tollRoad?"#10b981":"#e2e8f0"}}>
                        {b.tollRoad&&"\uD83D\uDEE3\uFE0F "}{b.name.replace(/, .*/,"")}
                      </span>
                      <span style={{fontSize:10,color:"#64748b"}}>{b.region}</span>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:4,fontSize:10,color:"#64748b"}}>
                      <span>Runway: {b.runway}</span>
                      <span>Current: {b.current}</span>
                    </div>
                    {b.planned&&<div style={{fontSize:10,color:"#f59e0b",marginTop:2}}>Planned — not yet tested</div>}
                    {isSel&&b.note&&<div style={{fontSize:11,color:"#94a3b8",marginTop:6,lineHeight:1.5,paddingTop:6,borderTop:"1px solid rgba(255,255,255,0.1)"}}>{b.note}</div>}
                  </div>
                );
              })}
            </div>

            {/* Result */}
            {selectedBs&&<div style={{background:selectedAC.aspirational?"rgba(6,182,212,0.1)":"rgba(245,158,11,0.1)",border:`1px solid ${selectedAC.aspirational?"rgba(6,182,212,0.3)":"rgba(245,158,11,0.3)"}`,borderRadius:10,padding:"14px 18px"}}>
              {selectedAC.aspirational&&<div style={{fontSize:9,fontWeight:800,color:"#06b6d4",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>WHAT-IF SCENARIO</div>}
              <div style={{fontSize:14,fontWeight:700,color:selectedAC.aspirational?"#06b6d4":"#f59e0b",marginBottom:4}}>{selectedAC.name} from {selectedBs.name.replace(/, .*/,"")}</div>
              <div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.6}}>
                {plannerCat==="Radars"?"Detection":"Coverage"} radius: <strong>{selectedAC.radius} km</strong> • {selectedBs.runway!=="N/A"?`Runway: ${selectedBs.runway} • `:""}Region: {selectedBs.region}
                {selectedBs.tollRoad&&<span style={{color:"#10b981",fontWeight:600}}> • Toll road dispersal strip</span>}
              </div>
            </div>}
          </>}

          <div style={{fontSize:10,color:"#475569",marginTop:12}}>Base eligibility based on runway length and infrastructure requirements. {plannerShowAspi&&<span style={{color:"#06b6d4"}}>What-If platforms are curated world-class systems not yet in TNI inventory — for force design exploration only. </span>}Toll road strips per KSAU Marshal Tonny Harjono's stated goal of one operational strip per province.</div>
        </div>
        );
      })()}

      {/* Planner Map */}
      <div style={{background:"#0f172a",borderRadius:12,overflow:"hidden",marginTop:16,border:"1px solid #334155",position:"relative"}}>
        <svg viewBox={`0 0 ${mapW} ${mapH}`} style={{width:"100%",height:"auto",display:"block"}}>
          {/* Ocean */}
          <rect width={mapW} height={mapH} fill="#0c1929"/>
          {/* Neighbor countries */}
          {neighborPaths.map((np,i)=>(<path key={i} d={np.d} fill="#1e293b" stroke="#334155" strokeWidth="0.3"/>))}
          {/* Indonesia */}
          <path d={idnPath} fill="#1e3a5f" stroke="#475569" strokeWidth="0.5"/>

          {/* Eligible base markers — only show bases matching selected system tier */}
          {(()=>{
            const allBases = plannerEligibleBases.length > 0 ? plannerEligibleBases : PLANNER_BASES;
            return allBases.map((b)=>{
              const pt=projection([b.coords[1],b.coords[0]]);
              if(!pt)return null;
              const isSel=plannerBase===b.name;
              const isToll=b.tollRoad;
              const isPlanned=b.planned;
              const isNaval=b.tiers.includes(20)||b.tiers.includes(21);
              const isRadar=b.tiers.includes(10);
              const isEligible=plannerEligibleBases.includes(b);
              const dotColor=isToll?"#10b981":isNaval?"#3b82f6":isRadar?"#06b6d4":"#f59e0b";
              return(
                <g key={b.name} onClick={()=>{if(isEligible)setPlannerBase(isSel?null:b.name);}} style={{cursor:isEligible?"pointer":"default"}}>
                  {isSel&&<circle cx={pt[0]} cy={pt[1]} r={8} fill="none" stroke="#f59e0b" strokeWidth={1.5} opacity={0.6}>
                    <animate attributeName="r" from="6" to="14" dur="1.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite"/>
                  </circle>}
                  <circle cx={pt[0]} cy={pt[1]} r={isSel?5:3.5} fill={dotColor} stroke="#fff" strokeWidth={0.8} opacity={isPlanned?0.3:isEligible?1:0.2}/>
                  {(isSel||isEligible)&&<text x={pt[0]+6} y={pt[1]+3} fontSize="5.5" fill={isSel?"#f59e0b":"#94a3b8"} fontWeight={isSel?700:400} opacity={isSel?1:0.6}>{b.name.replace(/Lanud |Koarmada |Kohanudnas |Lantamal |Lanal |, .*|JTTS |Trans-| \(planned\)/g,"")}</text>}
                </g>
              );
            });
          })()}

          {/* Planner radius ring */}
          {plannerRingData&&<g>
            <circle cx={plannerRingData.cx} cy={plannerRingData.cy} r={plannerRingData.r} fill={plannerRingData.color} fillOpacity="0.08" stroke={plannerRingData.color} strokeWidth="2" strokeDasharray={plannerRingData.aspirational?"4,4":"8,4"} opacity="0.9"/>
            <circle cx={plannerRingData.cx} cy={plannerRingData.cy} r={plannerRingData.r*0.5} fill="none" stroke={plannerRingData.color} strokeWidth="0.5" strokeDasharray="3,5" opacity="0.3"/>
            <text x={plannerRingData.cx} y={plannerRingData.cy-plannerRingData.r-6} textAnchor="middle" fill={plannerRingData.color} fontSize="8" fontWeight="700" opacity="0.95">{plannerRingData.aspirational?"[WHAT-IF] ":""}{plannerRingData.label}</text>
            <text x={plannerRingData.cx+plannerRingData.r+4} y={plannerRingData.cy+3} fill={plannerRingData.color} fontSize="7" opacity="0.7">{plannerRingData.radiusKm} km</text>
          </g>}
        </svg>
        {!plannerAircraft&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",color:"#475569",fontSize:14,fontWeight:600,textAlign:"center",pointerEvents:"none"}}>Select a system below to begin</div>}
        {plannerAircraft&&!plannerBase&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",color:"#f59e0b",fontSize:13,fontWeight:600,textAlign:"center",pointerEvents:"none",background:"rgba(15,23,42,0.8)",padding:"8px 16px",borderRadius:8}}>Now select a base — click a dot on the map or pick from the list below</div>}
      </div>

      {/* On Order / Base TBD */}
      {unlocatedSystems.length > 0 && (
        <div style={{ marginTop: 16, background:"#f9fafb", borderRadius:10, padding:"14px 18px", border:"1px solid #e5e7eb" }}>
          <h3 style={{ fontSize: 12, fontWeight: 700, color: "#9ca3af", marginBottom: 8, letterSpacing: ".5px", textTransform: "uppercase" }}>On Order / Base TBD ({unlocatedSystems.length}) — these systems need basing decisions</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {unlocatedSystems.map(w => (
              <span key={w.id} style={{ padding: "4px 10px", borderRadius: 6, fontSize: 11, background: "#fff", color: "#6b7280", border: "1px solid #e5e7eb" }}>
                {w.name}
              </span>
            ))}
          </div>
        </div>
      )}
      </>}
    </div>
  );
}



function A2ADView() {
  const [activeLayer, setActiveLayer] = useState("all");
  const [hoveredCP, setHoveredCP] = useState(null);

  const mapW = 960, mapH = 540;
  const projection = useMemo(() => d3.geoMercator().center([118, -4]).scale(1050).translate([mapW / 2, mapH / 2]), []);
  const pathGen = useMemo(() => d3.geoPath().projection(projection), [projection]);
  const idnFeature = useMemo(() => ({ type: "Feature", properties: {}, geometry: { type: "MultiPolygon", coordinates: IDN_GEO } }), []);
  const idnPath = useMemo(() => pathGen(idnFeature), [pathGen, idnFeature]);
  const neighborPaths = useMemo(() => Object.entries(NEIGHBORS).map(([name, polygons]) => {
    const f = { type: "Feature", properties: { name }, geometry: { type: "MultiPolygon", coordinates: polygons.map(r => [r]) } };
    const c = d3.geoCentroid(f); const p = projection(c);
    return { name, path: pathGen(f), cx: p?p[0]:0, cy: p?p[1]:0 };
  }), [pathGen, projection]);
  const graticule = useMemo(() => pathGen(d3.geoGraticule().step([5,5])()), [pathGen]);
  const alkiPaths = useMemo(() => ALKI_ROUTES.map(route => {
    const points = route.waypoints.map(wp => projection([wp[0], wp[1]])).filter(Boolean);
    const pathStr = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ");
    const mid = points[Math.floor(points.length / 2)];
    return { ...route, path: pathStr, labelX: mid?mid[0]:0, labelY: mid?mid[1]:0 };
  }), [projection]);
  const eezPath = useMemo(() => {
    const pts = EEZ_BOUNDARY.map(wp => projection([wp[0], wp[1]])).filter(Boolean);
    return pts.map((p,i) => `${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ") + "Z";
  }, [projection]);

  // A2/AD layer definitions
  const layers = {
    outer: { label: "Outer Layer", desc: "Long-range detection & deterrence", color: "#3b82f6",
      systems: ["SU27","SU30","RAFALE","F16AM","F16CD","CAKRA","NAGAPASA","MASTERT","TRS2215","AR325","GM400","B737","CN235MPA","NC212MPA"] },
    middle: { label: "Middle Layer", desc: "Area denial & surface control", color: "#10b981",
      systems: ["MARTADINATA","BRAWIJAYA","AHMADYANI","DIPONEGORO","ANKAS","CH4","NASAMS","SIPER","HISARO","KHAN","BORA"] },
    inner: { label: "Inner Layer", desc: "Point defense & coastal denial", color: "#ef4444",
      systems: ["C705","EXOCET_SHORE","BRAHMOS","ATMACA","YAKHONT","KCR60","KCR40","SKYSHIELD","MISTRAL","QW3","STARSTREAK","CAESAR","ASTROS"] },
  };

  // System type classification for visual differentiation
  const getSystemType = (sysId) => {
    const fighters = ["SU27","SU30","RAFALE","F16AM","F16CD","HAWK200","T50I","EMB314"];
    const radars = ["MASTERT","TRS2215","AR325","GM200","GM400"];
    const subs = ["CAKRA","NAGAPASA"];
    const ships = ["MARTADINATA","BRAWIJAYA","AHMADYANI","DIPONEGORO","KCR60","KCR40"];
    const missiles = ["KHAN","BORA","ASTROS","C705","EXOCET_SHORE","ATMACA","YAKHONT"];
    const airdef = ["SKYSHIELD","NASAMS","MISTRAL","QW3","HISARO","SIPER","STARSTREAK"];
    const uavs = ["ANKAS","CH4","TB2"];
    const isr = ["B737","CN235MPA","NC212MPA"];
    if (fighters.includes(sysId)) return "fighter";
    if (radars.includes(sysId)) return "radar";
    if (subs.includes(sysId)) return "submarine";
    if (ships.includes(sysId)) return "ship";
    if (missiles.includes(sysId)) return "missile";
    if (airdef.includes(sysId)) return "airdef";
    if (uavs.includes(sysId)) return "uav";
    if (isr.includes(sysId)) return "isr";
    return "other";
  };

  const typeStyles = {
    fighter:   { color: "#3b82f6", dash: "none",  fillOp: 0.06, strokeW: 1.2, label: "Fighter CAP" },
    radar:     { color: "#06b6d4", dash: "2,3",   fillOp: 0.04, strokeW: 0.6, label: "Radar Coverage" },
    submarine: { color: "#8b5cf6", dash: "8,4",   fillOp: 0.06, strokeW: 1.0, label: "Submarine Patrol" },
    ship:      { color: "#64748b", dash: "6,3",   fillOp: 0.05, strokeW: 0.8, label: "Surface Combatant" },
    missile:   { color: "#ef4444", dash: "none",  fillOp: 0.10, strokeW: 1.5, label: "Missile Range" },
    airdef:    { color: "#a855f7", dash: "3,2",   fillOp: 0.06, strokeW: 0.7, label: "Air Defense" },
    uav:       { color: "#10b981", dash: "4,4",   fillOp: 0.04, strokeW: 0.6, label: "UAV SATCOM Range" },
    isr:       { color: "#0ea5e9", dash: "10,5",  fillOp: 0.03, strokeW: 0.5, label: "ISR Patrol" },
    other:     { color: "#9ca3af", dash: "3,3",   fillOp: 0.05, strokeW: 0.6, label: "Other" },
  };

  // Compute range rings for active layer(s)
  const rings = useMemo(() => {
    const activeSystems = activeLayer === "all"
      ? [...layers.outer.systems, ...layers.middle.systems, ...layers.inner.systems]
      : (layers[activeLayer]?.systems || []);
    const result = [];
    activeSystems.forEach(sysId => {
      const cr = COMBAT_RADIUS[sysId];
      if (!cr) return;
      const sType = getSystemType(sysId);
      const bases = SYSTEM_BASES[sysId] || [];
      bases.forEach(baseName => {
        const coord = BASE_COORDS[baseName];
        if (!coord) return;
        const latRad = coord[0] * Math.PI / 180;
        const kmPerDeg = 111.32 * Math.cos(latRad);
        const degRadius = cr.radius / kmPerDeg;
        const center = projection([coord[1], coord[0]]);
        const edge = projection([coord[1] + degRadius, coord[0]]);
        if (!center || !edge) return;
        const pxRadius = Math.max(Math.abs(edge[0] - center[0]), 12);
        const layerKey = layers.outer.systems.includes(sysId) ? "outer" : layers.middle.systems.includes(sysId) ? "middle" : "inner";
        result.push({ cx: center[0], cy: center[1], r: pxRadius, label: cr.label, radiusKm: cr.radius, layer: layerKey, sType });
      });
    });
    return result;
  }, [activeLayer, projection]);

  return (
    <div style={{ marginTop: 36 }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 26, fontWeight: 800, color: "#111", marginBottom: 6 }}>Strategic Environment</h2>
        <p style={{ fontSize: 14, color: "#9ca3af", margin: 0 }}>Assessing Indonesia's defense posture against regional contingencies</p>
      </div>

      {/* Strategic assessment — hidden for now, set to true to re-enable */}
      {false &&
      <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", padding: 24, marginBottom: 24 }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: "#111", marginBottom: 6 }}>The PTN Gap: Hardware Without Doctrine</div>
        <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 16, lineHeight: 1.6 }}>PTN is optimized for deterrence by denial in peacetime — defending Indonesia's archipelago against conventional incursion. But the scenarios that keep regional strategists up at night would test Indonesia in ways PTN does not address. This assessment draws on research by <a href="https://www.iiss.org/people/iiss-asia/evan-laksmana/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>Evan A. Laksmana</a> (IISS Senior Fellow): <a href="https://www.iiss.org/research-paper/2026/02/contingent-capabilities-southeast-asias-emerging-anti-access-environment/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>Contingent Capabilities: Southeast Asia's Emerging Anti-access Environment</a> (IISS, Feb 2026), <a href="https://www.iiss.org/research-paper/2026/02/building-blocks-enhancing-southeast-asias-crisis-response-architecture/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>Building Blocks: Enhancing Southeast Asia's Crisis-response Architecture</a> (IISS, Feb 2026), and <a href="https://www.iiss.org/research-paper/2026/03/simulating-southeast-asias-nuclear-security-crisis-responses/" target="_blank" rel="noopener" style={{color:"#2563eb"}}>Simulating Southeast Asia's Nuclear-Security Crisis Responses</a> (IISS, Mar 2026).</div>
        
        <div style={{ fontSize: 14, fontWeight: 700, color: "#111", marginBottom: 6 }}>What PTN gets right</div>
        <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.8, marginBottom: 16 }}>
          The procurement wave is real. $8B in Rafales, $2B in Scorpène submarines, a carrier, 60 armed drones, 48 fifth-gen KAAN fighters. Laksmana's "Contingent Capabilities" paper maps an emerging A2/AD environment across maritime Southeast Asia — and Indonesia's PTN fits the pattern. The region is acquiring long-range anti-ship missiles, coastal radar networks, and submarine fleets that collectively raise the cost of uninvited naval access. For Indonesia's most likely peacetime missions — Natuna EEZ enforcement, ALKI sovereignty signaling, grey-zone deterrence — more platforms genuinely raise the cost of intrusion.
        </div>

        <div style={{ fontSize: 14, fontWeight: 700, color: "#111", marginBottom: 6 }}>What it misses</div>
        <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.8, marginBottom: 16 }}>
          {[
            ["Joint C2 doesn't exist.","TNI's three branches have never conducted a serious combined operation. PTN buys platforms for each matra but not the command architecture to fight them together. Laksmana's A2/AD paper notes these capabilities remain 'contingent' — dependent on operational integration that most SE Asian militaries have not achieved."],
            ["No crisis-response architecture.","The 'Building Blocks' paper exposes a harder problem: ASEAN has no mechanism for coordinating during a major-power crisis. Over 700,000 SE Asian nationals work in Taiwan — 80% of them Indonesian. In the IISS crisis simulation, SE Asian states couldn't organize an evacuation without Singapore's intervention. Indonesia has no NEO plan for its own citizens."],
            ["The drone doctrine is pre-Ukraine.","The original PTN allocated 65 UAVs total. The 81-unit Baykar order wave corrects the quantity but not the concept — no evidence of kill-chain integration, swarm doctrine, or ISR-to-fires architecture."],
            ["Nuclear shadow is unaddressed.","The IISS nuclear-crisis simulation found SE Asian states have almost no institutional capacity to respond to nuclear escalation scenarios. PTN is a conventional-force plan operating in a region where the next major conflict may go nuclear within days."],
          ].map(([bold,rest],i)=>(
            <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <span style={{ color: "#C8A951", fontWeight: 800, fontSize: 14, lineHeight: "20px", flexShrink: 0 }}>›</span>
              <span><strong>{bold}</strong> {rest}</span>
            </div>
          ))}
        </div>

        <div style={{ fontSize: 14, fontWeight: 700, color: "#111", marginBottom: 6 }}>The real question</div>
        <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.8, marginBottom: 0 }}>
          Taiwan contingency. South China Sea escalation. A major-power navy demanding passage through Lombok or Makassar. PTN buys weapons that make peacetime deterrence credible — but Laksmana's research consistently points to the same gap: Southeast Asian states are acquiring A2/AD capabilities without the crisis-management infrastructure, joint operational doctrine, or political frameworks to actually employ them under pressure. Indonesia's real deficit is not hardware. It is the absence of an answer to the question no Indonesian strategic document addresses: what does Jakarta do when "free and active" collides with a superpower that isn't asking permission?
        </div>
      </div>}

      {/* A2/AD Layered Defense Map */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: "#111", marginBottom: 4 }}>A2/AD Layered Defense Posture</div>
        <p style={{ fontSize: 12, color: "#9ca3af", margin: "0 0 12px" }}>Current anti-access/area-denial coverage across ALKI sea lanes and EEZ</p>
      </div>

      {/* Layer selector */}
      <div style={{ background: "linear-gradient(135deg, #111827 0%, #0f172a 100%)", borderRadius: 10, padding: "14px 16px", marginBottom: 12, border: "1px solid #1e3a5f" }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: 11, color: "#C8A951", fontWeight: 700, letterSpacing: "1px", textTransform: "uppercase", marginRight: 4 }}>Defense Layers</span>
          {[["all","All Layers","#C8A951"],["outer","Outer","#3b82f6"],["middle","Middle","#10b981"],["inner","Inner","#ef4444"]].map(([k,l,c]) => (
            <button key={k} onClick={() => setActiveLayer(k)}
              style={{ padding: "6px 14px", borderRadius: 20, fontSize: 10, fontWeight: 700, cursor: "pointer",
                border: activeLayer === k ? `1px solid ${c}` : "1px solid #374151",
                background: activeLayer === k ? `${c}18` : "#1f2937",
                color: activeLayer === k ? c : "#6b7280", transition: "all .2s" }}>{l}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 16, marginTop: 10, fontSize: 10 }}>
          {Object.entries(layers).map(([k, v]) => (
            <div key={k} style={{ display: "flex", alignItems: "center", gap: 4, opacity: activeLayer === "all" || activeLayer === k ? 1 : 0.3 }}>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: v.color }} />
              <span style={{ color: v.color, fontWeight: 600 }}>{v.label}:</span>
              <span style={{ color: "#6b8bb5" }}>{v.desc}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Map */}
      <div style={{ background: "#0a1628", borderRadius: 12, overflow: "hidden", border: "1px solid #1e3a5f" }}>
        <svg viewBox={`0 0 ${mapW} ${mapH}`} style={{ width: "100%", height: "auto", display: "block" }}>
          <defs>
            <radialGradient id="ocean2" cx="50%" cy="50%" r="70%"><stop offset="0%" stopColor="#0d1f3c"/><stop offset="100%" stopColor="#060e1a"/></radialGradient>
          </defs>
          <rect x="-2000" y="-2000" width="6000" height="6000" fill="url(#ocean2)" />
          <path d={graticule} fill="none" stroke="#1a2d4a" strokeWidth="0.3" strokeDasharray="2,4" />

          {/* EEZ */}
          <path d={eezPath} fill="none" stroke="#3b82f6" strokeWidth="1" strokeDasharray="6,3" opacity="0.4" />

          {/* ALKI Routes */}
          {alkiPaths.map((route, i) => (
            <g key={`alki-${i}`}>
              <path d={route.path} fill="none" stroke={route.color} strokeWidth="2.5" strokeDasharray="8,4" opacity="0.5" strokeLinecap="round" />
              <path d={route.path} fill="none" stroke={route.color} strokeWidth="8" opacity="0.06" strokeLinecap="round" />
              <text x={route.labelX + 6} y={route.labelY - 5} fill={route.color} fontSize="7" fontWeight="700" opacity="0.8">{route.name}</text>
            </g>
          ))}

          {/* Neighbors */}
          {neighborPaths.map(n => (
            <g key={n.name}><path d={n.path} fill="#0e1a2e" stroke="#1a2d4a" strokeWidth="0.4" />
              <text x={n.cx} y={n.cy} textAnchor="middle" fill="#1a2d4a" fontSize="7" fontWeight="600" letterSpacing="1.5">{n.name.toUpperCase()}</text></g>
          ))}

          {/* Indonesia */}
          <path d={idnPath} fill="#162a46" stroke="#2a5080" strokeWidth="0.6" />

          {/* Range rings by type */}
          {rings.map((ring, i) => {
            const ts = typeStyles[ring.sType] || typeStyles.other;
            return <circle key={`r-${i}`} cx={ring.cx} cy={ring.cy} r={ring.r}
              fill={ts.color} fillOpacity={ts.fillOp}
              stroke={ts.color} strokeWidth={ts.strokeW}
              strokeDasharray={ts.dash === "none" ? undefined : ts.dash}
              opacity="0.7" />;
          })}

          {/* Potential flashpoints (💥) */}
          {[
            {coords:[107,7]},{coords:[121,5.5]},{coords:[134,1.5]},
            {coords:[131,-10.5]},{coords:[115,-12]},{coords:[104,-8]},
          ].map((fp,i)=>{
            const p=projection(fp.coords);
            if(!p)return null;
            return <text key={`a2fp-${i}`} x={p[0]} y={p[1]+5} textAnchor="middle" fontSize="18" opacity="0.85" style={{cursor:"default"}}>{"\uD83D\uDCA5"}</text>;
          })}

          {/* Historical border disputes (⚔️) */}
          {[
            {coords:[108.0,5.5],label:"North Natuna Sea",desc:"vs China"},
            {coords:[118.4,2.15],label:"Ambalat",desc:"vs Malaysia"},
            {coords:[118.63,4.11],label:"Sipadan & Ligitan",desc:"vs Malaysia"},
          ].map((bd,i)=>{
            const p=projection(bd.coords);
            if(!p)return null;
            return <g key={`a2bd-${i}`}>
              <text x={p[0]} y={p[1]+5} textAnchor="middle" fontSize="17" opacity="0.9">{"\u2694\uFE0F"}</text>
              <text x={p[0]+12} y={p[1]+2} fontSize="6.5" fill="#fbbf24" fontWeight="600" opacity="0.8">{bd.label}</text>
              <text x={p[0]+12} y={p[1]+8} fontSize="5" fill="#94a3b8" opacity="0.6">{bd.desc}</text>
            </g>;
          })}

          {/* Key mining sites (⛏️) */}
          {[
            {coords:[106.1,-2.1],label:"Bangka Belitung",desc:"Tin",tier:"high"},
            {coords:[104.6,1.05],label:"Bintan",desc:"Bauxite",tier:"high"},
            {coords:[109.9,-1.8],label:"Ketapang",desc:"Bauxite",tier:"high"},
            {coords:[128.0,0.4],label:"Halmahera",desc:"Nickel",tier:"mid"},
            {coords:[121.6,-4.0],label:"Kolaka",desc:"Nickel",tier:"mid"},
          ].map((ms,i)=>{
            const p=projection(ms.coords);
            if(!p)return null;
            return <g key={`a2mine-${i}`}>
              <text x={p[0]} y={p[1]+5} textAnchor="middle" fontSize="18" opacity={ms.tier==="high"?0.9:0.75}>{"\u26CF\uFE0F"}</text>
              <text x={p[0]+11} y={p[1]+2} fontSize="6" fill={ms.tier==="high"?"#f97316":"#d97706"} fontWeight="600" opacity="0.8">{ms.label}</text>
              <text x={p[0]+11} y={p[1]+8} fontSize="4.5" fill="#94a3b8" opacity="0.6">{ms.desc}</text>
            </g>;
          })}

          {/* Labels */}
          <text x="30" y="28" fill="#1e3a5f" fontSize="9" fontWeight="600" letterSpacing="2">INDIAN OCEAN</text>
          <text x={mapW - 120} y={mapH - 15} fill="#1e3a5f" fontSize="9" fontWeight="600" letterSpacing="2">PACIFIC OCEAN</text>
        </svg>
      </div>

      {/* Type legend */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 10, padding: "8px 12px", background: "#f9fafb", borderRadius: 8, border: "1px solid #e5e7eb" }}>
        {Object.entries(typeStyles).filter(([k]) => {
          if (activeLayer === "all") return true;
          const layerSystems = layers[activeLayer]?.systems || [];
          return layerSystems.some(s => getSystemType(s) === k);
        }).map(([k, ts]) => (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 10 }}>
            <svg width="20" height="12"><circle cx="10" cy="6" r="5" fill={ts.color} fillOpacity={ts.fillOp * 3} stroke={ts.color} strokeWidth={ts.strokeW} strokeDasharray={ts.dash === "none" ? undefined : ts.dash} /></svg>
            <span style={{ color: "#374151", fontWeight: 500 }}>{ts.label}</span>
          </div>
        ))}
      </div>

      {/* Map markers legend */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 6, padding: "6px 12px", background: "#f9fafb", borderRadius: 8, border: "1px solid #e5e7eb", fontSize: 10 }}>
        <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span>{"\uD83D\uDCA5"}</span> <span style={{color:"#ef4444",fontWeight:500}}>Potential Flashpoints</span></span>
        <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span>{"\u2694\uFE0F"}</span> <span style={{color:"#fbbf24",fontWeight:500}}>Border Disputes</span></span>
        <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span>{"\u26CF\uFE0F"}</span> <span style={{color:"#f97316",fontWeight:500}}>Mining Sites (amphibious-vulnerable)</span></span>
      </div>

      {/* Layer analysis narrative */}
      <div style={{ marginTop: 16, background: "#f9fafb", borderRadius: 10, padding: "16px 20px", border: "1px solid #e5e7eb" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#111", marginBottom: 8 }}>Layer-by-Layer Assessment</div>
        <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.7 }}>
          {activeLayer === "all" && "Indonesia's A2/AD architecture is organized around three ALKI corridors connecting the Pacific and Indian Oceans. The outer layer provides early warning through long-range radar (400+ km) and fighter combat air patrols from bases in Sumatra, Java, Sulawesi, and Papua. The middle layer deploys surface combatants and medium-range SAMs to contest sea control. The inner layer concentrates coastal AShM batteries, SHORAD systems, and fast attack craft at chokepoints — the straits of Sunda, Lombok, Makassar, Ombai, and Leti. Coverage gaps remain in eastern Indonesia (ALKI III branches) where basing infrastructure is thinnest."}
          {activeLayer === "outer" && "The outer detection and deterrence layer relies on 20 Kohanudnas radar stations (Master-T, Thomson TRS-2215, Plessey AR-325) providing 400-470 km detection coverage, plus fighter CAP from Su-27/30 at Makassar (750-800 km radius), F-16 at Iswahjudi/Roesmin Nurjadin (550 km), and incoming Rafale (1,100 km). Submarine patrols from Surabaya extend denial to ~1,500–2,000 km. Boeing 737 Surveiller and CN-235 MPA provide maritime ISR. Key gap: eastern Indonesia beyond Makassar has no fighter basing until Papua."}
          {activeLayer === "middle" && "The middle layer provides area denial through SIGMA and PPA-class frigates (1,350–1,500 km patrol radius), corvettes (800–1,000 km), and MALE UAVs (Anka-S, CH-4 at 200-250 km data link range). The KHAN SRBM at Tenggarong (280 km) and ASTROS MLRS (300 km) add land-based deep strike. Planned NASAMS, Hisar-O, and Siper SAMs will create medium-range air defense zones. The middle layer is strongest around Java and the Makassar Strait (ALKI II) but thin around ALKI III."}
          {activeLayer === "inner" && "The inner denial layer concentrates at chokepoints: C-705 shore-launched AShM (130 km) at Koarmada I/II, Atmaca missiles on Red White Frigates (250 km), KCR-40/60 fast attack craft for sprint intercepts (300–400 km sortie radius), and Starstreak ForceSHIELD VSHORAD (7 km) at Arhanud units. CAESAR 155mm SPH provides fire support at 42 km. This layer is designed to make strait transit prohibitively costly. Strongest at Sunda Strait (ALKI I) and Lombok/Makassar (ALKI II); weakest at ALKI III eastern branches."}
        </div>
      </div>
    </div>
  );
}
