const getCondition=(w)=>{
  const n=(w.specs.note||"").toLowerCase()+(w.name||"").toLowerCase();
  if(w.status==="Retired")return "Second-Hand";
  if(n.includes("ex-")||n.includes("excess defense")||n.includes("eda")||n.includes("transferred")||n.includes("used a/c")||n.includes("decommissioned")||n.includes("ex ")||n.includes("stored 12 year"))return "Second-Hand";
  if(n.includes("refurbish")||n.includes("moderniz")||n.includes("upgraded")||n.includes("emlu")||n.includes("retrofit"))return "Refurbished";
  if(["On Order","Under Construction","In Development","Under Negotiation","Delivering","Active / Producing"].includes(w.status))return "New Build";
  if(w.status==="Active"&&!w.status.includes("aging"))return "New Build";
  if(w.status.includes("aging")){
    // Aging systems — check if originally second-hand
    if(n.includes("ex-")||n.includes("transferred"))return "Second-Hand";
    return "New Build (aging)";
  }
  return "New Build";
};

                  </div>
                  <div style={{fontSize:11,color:"#6b7280",lineHeight:1.6}}>{src[1]}</div>
                </div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

function OriginChart(){
  const [hovered,setHovered]=useState(null);
  const [viewMode,setViewMode]=useState("sankey"); // sankey or bar or partners
  const [expandedSupplier,setExpandedSupplier]=useState(null);
  const [sankeyOrder,setSankeyOrder]=useState("country_branch"); // simplified default
  const [sankeyZoom,setSankeyZoom]=useState(100);
  const [sankeyWeight,setSankeyWeight]=useState("count"); // "count" or "value"
  const [selectedSC,setSelectedSC]=useState("RAFALE");
  const sankeyRef=useRef(null);

  // Parse contract value string to $B number (returns 0 if unparseable)
  const parseCV=(id)=>{
    const v=CONTRACT_VALUES[id];
    if(!v)return 0;
    const bM=v.match(/\$([\d.]+)B/);if(bM)return parseFloat(bM[1]);
    const mM=v.match(/\$([\d.]+)M/);if(mM)return parseFloat(mM[1])/1000;
    const rM=v.match(/\$([\d.]+)[–-]([\d.]+)M/);if(rM)return(parseFloat(rM[1])+parseFloat(rM[2]))/2/1000;
    const rB=v.match(/\$([\d.]+)[–-]([\d.]+)B/);if(rB)return(parseFloat(rB[1])+parseFloat(rB[2]))/2;
    const eM=v.match(/[€¥]([\d.]+)M/);if(eM)return parseFloat(eM[1])/1000;
    const eB=v.match(/[€¥]([\d.]+)B/);if(eB)return parseFloat(eB[1]);
    return 0;
  };

  // Alliance bloc classification
  const BLOC_MAP={"United States":"NATO","France":"NATO","United Kingdom":"NATO","Germany":"NATO","Netherlands":"NATO","Italy":"NATO","Spain":"NATO","Norway":"NATO","Czechia":"NATO","Canada":"NATO","Türkiye":"NATO","Europe":"NATO","Austria":"Neutral","Switzerland":"Neutral","Indonesia":"Domestic","India":"BRICS","Brazil":"BRICS","Russia":"BRICS","China":"BRICS","Soviet Union":"BRICS","South Korea":"US Ally (non-NATO)","Japan":"US Ally (non-NATO)","Australia":"US Ally (non-NATO)","Israel":"US Ally (non-NATO)","TBD":"NATO"};
  const BLOC_COLORS={"NATO":"#3b82f6","US Ally (non-NATO)":"#8b5cf6","BRICS":"#f59e0b","Neutral":"#94a3b8","Domestic":"#dc2626"};
  const ADMIN_COLORS={"Soekarno":"#059669","Suharto":"#ca8a04","Reform Era":"#6b7280","SBY":"#2563eb","Jokowi":"#dc2626","Prabowo":"#38bdf8"};
  const oColors={"United States":"#3b82f6","France":"#ef4444","Türkiye":"#f97316","South Korea":"#8b5cf6","Russia":"#64748b","Germany":"#fbbf24","United Kingdom":"#14b8a6","Indonesia":"#dc2626","Italy":"#22c55e","India":"#ec4899","Europe":"#6366f1","Netherlands":"#0ea5e9","Brazil":"#84cc16","China":"#f43f5e","Czechia":"#a855f7","Sweden":"#06b6d4","Switzerland":"#10b981","Japan":"#f59e0b","Canada":"#6366f1","Spain":"#e11d48","Israel":"#0d9488","Norway":"#64748b","Austria":"#94a3b8","Soviet Union":"#b91c1c","Australia":"#15803d","TBD":"#94a3b8"};
  const getColor=(name)=>oColors[name]||"#94a3b8";

  // Contract year -> admin mapping
  const CY={"F16AM":1986,"HAWK109":1978,"HAWK200":1993,"C130H":1975,"BO105":1976,"AMX13":1960,"PATTIMURA":1993,"CAKRA":1977,"MANDAU":1977,"SUPERPUMA":1983,"BMP3F":1998,"BVP2":1994,"M109":1982,"KH179":1989,"TRS2215":1980,"AR325":1983,"SU27":1997,"SU30":2003,"MI35":2003,"MAKASSAR":2003,"BELL412":1982,"B737":1982,"AMX10PAC":1990,"AHMADYANI":1980,"FATAHILLAH":1975,"F16CD":2011,"NAGAPASA":2011,"DIPONEGORO":2005,"CN295":2005,"APACHE":2013,"T50I":2011,"ASTROS":2012,"CAESAR":2012,"USMANHARUN":2009,"H225M":2012,"MARTADINATA":2012,"FENNEC":2012,"SKYSHIELD":2006,"MISTRAL":2012,"PANDUR":2012,"MASTERT":2010,"LEO2":2012,"LEO2RI":2012,"MARDER":2012,"BUNGTOMO":2004,"KCR60":2014,"KCR40":2014,"EMB314":2010,"C705":2010,"QW3":2008,"STARSTREAK":2012,"GM200":2012,"CN235MPA":2012,"AS565":2004,"HARIMAU":2015,"CH4":2014,"MAUNG":2019,"KLEWANG":2018,"KF21":2016,"BUNGKARNO":2021,"RWFRIGATE":2021,"RAFALE":2022,"A400M":2022,"ANKAS":2022,"KHAN":2022,"HISARO":2022,"SIPER":2022,"BORA":2022,"C130J":2020,"NASAMS":2023,"BLACKHAWK":2023,"GM400":2023,"CZECH_RADAR":2023,"SCORPENE":2024,"BRAWIJAYA":2024,"GARIBALDI":2024,"ATMACA":2024,"A330MRTT":2024,"EXOCET_SHORE":2024,"KCR70M":2024,"PTPAL_AUV":2024,"KAAN":2025,"TB2":2025,"TB3":2025,"AKINCI":2025,"M346FA":2025,"ISTIF":2025,"CAKIR":2025,"PC24":2026,"PC21":2026,"BRAHMOS":2026,"FREMM":2021,"MAESTRALE":2021,"GARIB_HELO_T":2025,"GARIB_HELO_U":2025,"MOGAMI":2021,"ANOA":2010,"BADAK":2014,"KOMODO":2012,"MI17":2007,"JAVELIN":2016,"SCORPION90":1984,"BELL205":1975,"RM70":2014,"BELL412AU":1982,"SCORPENE":2024,"GARIBALDI":2024,"YAKHONT":2007,"NC212MPA":1996,"P51":1950,"MIG15":1961,"MIG17":1961,"MIG19":1961,"MIG21":1962,"SABRE":1971,"F5E":1978,"A4":1979,"OV10":1976,"B25":1950,"TU16":1961,"IL28":1961,"SVERDLOV":1962,"WHISKEY":1962,"MI4":1960};
  const getAdmin=(y)=>{if(!y)return "Unknown";if(y<1966)return "Soekarno";if(y<1998)return "Suharto";if(y<2004)return "Reform Era";if(y<2014)return "SBY";if(y<2024)return "Jokowi";return "Prabowo";};

  // Build Sankey data with both count and value weighting
  const sankeyData = useMemo(()=>{
    const blocMap={},oMap={},aMap={},brMap={};
    const blocMapV={},oMapV={},aMapV={},brMapV={};
    const flowBO={},flowOA={},flowAB={},flowOBr={},flowBrA={};
    const flowBOv={},flowOAv={},flowABv={},flowOBrv={},flowBrAv={};
    const sysMap={};
    let totalValue=0, valuedCount=0;

    WEAPON_SYSTEMS.forEach(w=>{
      let o=w.origin;
      if(o.includes("/")){const parts=o.split("/").map(s=>s.trim());const ni=parts.filter(p=>p!=="Indonesia");o=ni.length>0?ni[0]:parts[0];}
      if(o==="Europe (Airbus)")o="Europe";if(o==="Germany (East)")o="Germany";if(o==="Czech Republic")o="Czechia";if(o==="TBD")o="Italy";if(o==="Turkiye")o="Türkiye";

      const bloc=BLOC_MAP[o]||"Neutral";
      const admin=getAdmin(CY[w.id]);
      const br=w.branch;
      const val=parseCV(w.id);
      if(val>0){totalValue+=val;valuedCount++;}

      blocMap[bloc]=(blocMap[bloc]||0)+1; blocMapV[bloc]=(blocMapV[bloc]||0)+val;
      oMap[o]=(oMap[o]||0)+1; oMapV[o]=(oMapV[o]||0)+val;
      aMap[admin]=(aMap[admin]||0)+1; aMapV[admin]=(aMapV[admin]||0)+val;
      brMap[br]=(brMap[br]||0)+1; brMapV[br]=(brMapV[br]||0)+val;

      const kBO=bloc+"→"+o; flowBO[kBO]=(flowBO[kBO]||0)+1; flowBOv[kBO]=(flowBOv[kBO]||0)+val;
      const kOA=o+"→"+admin; flowOA[kOA]=(flowOA[kOA]||0)+1; flowOAv[kOA]=(flowOAv[kOA]||0)+val;
      const kAB=admin+"→"+br; flowAB[kAB]=(flowAB[kAB]||0)+1; flowABv[kAB]=(flowABv[kAB]||0)+val;
      const kOBr=o+"→"+br; flowOBr[kOBr]=(flowOBr[kOBr]||0)+1; flowOBrv[kOBr]=(flowOBrv[kOBr]||0)+val;
      const kBrA=br+"→"+admin; flowBrA[kBrA]=(flowBrA[kBrA]||0)+1; flowBrAv[kBrA]=(flowBrAv[kBrA]||0)+val;

      [kBO,kOA,kAB,kOBr,kBrA].forEach(k=>{if(!sysMap[k])sysMap[k]=[];sysMap[k].push(w.name);});
    });

    const mkEntries=(m,mv)=>Object.entries(m).map(([k,c])=>[k,c,mv[k]||0]).sort((a,b)=>b[1]-a[1]);
    const blocs=mkEntries(blocMap,blocMapV);
    const origins=mkEntries(oMap,oMapV);
    const admins=[["Soekarno",aMap["Soekarno"]||0,aMapV["Soekarno"]||0],["Suharto",aMap["Suharto"]||0,aMapV["Suharto"]||0],["Reform Era",aMap["Reform Era"]||0,aMapV["Reform Era"]||0],["SBY",aMap["SBY"]||0,aMapV["SBY"]||0],["Jokowi",aMap["Jokowi"]||0,aMapV["Jokowi"]||0],["Prabowo",aMap["Prabowo"]||0,aMapV["Prabowo"]||0],["Unknown",aMap["Unknown"]||0,aMapV["Unknown"]||0]].filter(([,c])=>c>0);
    const branches=Object.entries(brMap).map(([k,c])=>[k,c,brMapV[k]||0]).sort((a,b)=>b[1]-a[1]);

    return {blocs,origins,admins,branches,flowBO,flowOA,flowAB,flowOBr,flowBrA,flowBOv,flowOAv,flowABv,flowOBrv,flowBrAv,sysMap,totalValue,valuedCount};
  },[]);

  const totalSystems=sankeyData.origins.reduce((s,[,c])=>s+c,0);
  const isValMode=sankeyWeight==="value";
  const totalWeight=isValMode?sankeyData.totalValue:totalSystems;

  // Layout: 4 columns
  // Compute H based on actual node count for the active dimension pair
  const baseH=Math.max(620,sankeyData.origins.length*34+100,sankeyData.branches.length*80+100);
  const H=isValMode?Math.max(baseH,900):baseH;
  const W=1100;
  const nodeW=90;
  const colX=[0, 200, 520, 780];
  const PAD=5,MIN_H=6;
  const availH=H-50;

  const computePositions=(entries,startY)=>{
    let y=startY||25;
    const tw=totalWeight||1;
    return entries.map(([name,count,val])=>{
      const w=isValMode?(val||0):count;
      const h=Math.max(MIN_H,(w/tw)*availH-PAD);
      const pos={name,count,val,y,h};
      y+=h+PAD;
      return pos;
    });
  };

  const blocPos=useMemo(()=>computePositions(sankeyData.blocs),[sankeyData,sankeyWeight]);
  const oPos=useMemo(()=>computePositions(sankeyData.origins),[sankeyData,sankeyWeight]);
  const aPos=useMemo(()=>{
    const tw=totalWeight||1;
    const totalH=sankeyData.admins.reduce((s,[,c,,v])=>{const w=isValMode?(v||0):c;return s+Math.max(MIN_H,(w/tw)*availH-PAD)+PAD;},0);
    return computePositions(sankeyData.admins,25+(availH-totalH)/2);
  },[sankeyData,sankeyWeight]);
  const brPos=useMemo(()=>{
    return computePositions(sankeyData.branches);
  },[sankeyData,sankeyWeight]);

  // Generic path renderer for any pair of columns
  const renderPaths=(flowMap,leftPos,rightPos,leftColX,rightColX,colorFn)=>{
    const paths=[];
    const lOff={},rOff={};
    leftPos.forEach(p=>{lOff[p.name]=0;});
    rightPos.forEach(p=>{rOff[p.name]=0;});
    const tw=totalWeight||1;

    Object.entries(flowMap).sort((a,b)=>b[1]-a[1]).forEach(([key,count])=>{
      const [ln,rn]=key.split("→");
      const lp=leftPos.find(p=>p.name===ln);
      const rp=rightPos.find(p=>p.name===rn);
      if(!lp||!rp)return;
      const t=Math.max(1.5,(count/tw)*availH-PAD);
      const ly=lp.y+(lOff[ln]||0)+t/2;
      const ry=rp.y+(rOff[rn]||0)+t/2;
      lOff[ln]=(lOff[ln]||0)+t+0.5;
      rOff[rn]=(rOff[rn]||0)+t+0.5;
      const x1=leftColX+nodeW, x2=rightColX;
      const mx=(x1+x2)/2;
      const d=`M${x1},${ly} C${mx},${ly} ${mx},${ry} ${x2},${ry}`;
      const isH=hovered===key||hovered===ln||hovered===rn;
      const anyH=hovered!==null;
      paths.push(<path key={key} d={d} fill="none" stroke={colorFn(ln,rn)} strokeWidth={t} strokeOpacity={anyH?(isH?0.7:0.04):0.3} style={{transition:"stroke-opacity .2s",cursor:"pointer"}} onMouseEnter={()=>setHovered(key)} onMouseLeave={()=>setHovered(null)}/>);
    });
    return paths;
  };

  // Tooltip
  const tooltipInfo=useMemo(()=>{
    if(!hovered)return null;
    const sys=sankeyData.sysMap[hovered];
    if(sys)return {key:hovered,systems:sys};
    const all=Object.entries(sankeyData.sysMap).filter(([k])=>k.includes(hovered)).flatMap(([,s])=>s);
    if(all.length>0)return {key:hovered,systems:[...new Set(all)]};
    return null;
  },[hovered,sankeyData]);

  // Bar chart fallback
  // Bar chart: consolidate multi-country origins into primary country
  const [expandedBar,setExpandedBar]=useState(null);
  const barData=useMemo(()=>{
    const map={};
    WEAPON_SYSTEMS.forEach(w=>{
      let o=w.origin;
      o=o.replace(/\bTurkiye\b/g,"Türkiye");
      if(o==="TBD")o="Italy";
      // Consolidate: attribute to primary (first-listed) country
      // Keep "Indonesia" separate, group joint-Indo later
      if(o.includes("/") && !o.includes("Indonesia")){
        o=o.split("/")[0].trim();
        // Normalize some edge cases
        if(o==="Germany (East)") o="Germany";
        if(o==="Czechoslovakia"||o==="Czech Republic"||o==="Czechia") o="Czechia";
      }
      if(o==="Germany (East)") o="Germany";
      if(o==="Czechoslovakia"||o==="Czech Republic") o="Czechia";
      if(!map[o])map[o]={name:o,total:0,active:0,newOrder:0,aging:0,systems:[],value:0};
      map[o].total++;
      map[o].value+=parseCV(w.id);
      map[o].systems.push({name:w.name,status:w.status,id:w.id,origin:w.origin,manufacturer:w.manufacturer});
      const isNew=["On Order","Under Construction","In Development","Delivering","Under Negotiation"].includes(w.status);
      if(isNew)map[o].newOrder++;
      else map[o].active++;
      if(w.status.includes("aging"))map[o].aging++;
    });
    // Group Indonesia joint production with partner breakdown
    const result=[];
    const jointIndo={name:"Indonesia (Joint)",total:0,active:0,newOrder:0,aging:0,systems:[],isJoint:true,partners:{},value:0};
    Object.values(map).forEach(d=>{
      if(d.name.includes("/")&&d.name.includes("Indonesia")){
        const parts=d.name.split("/").map(s=>s.trim());
        const partner=parts.filter(p=>p!=="Indonesia").join(" / ")||"Indonesia";
        if(!jointIndo.partners[partner])jointIndo.partners[partner]={count:0,systems:[]};
        jointIndo.partners[partner].count+=d.total;
        jointIndo.partners[partner].systems.push(...d.systems);
        jointIndo.total+=d.total;jointIndo.active+=d.active;jointIndo.newOrder+=d.newOrder;jointIndo.aging+=d.aging;jointIndo.systems.push(...d.systems);jointIndo.value+=(d.value||0);
      } else {
        result.push(d);
      }
    });
    if(jointIndo.total>0)result.push(jointIndo);
    result.sort((a,b)=>b.total-a.total);
    return result;
  },[]);

  return(
    <div style={{marginTop:32}}>

        <div>
          <h2 style={{fontSize:26,fontWeight:800,color:"#111",marginBottom:6}}>Country of Origin</h2>
          <p style={{fontSize:14,color:"#9ca3af"}}>Weapon system types by supplier nation — {totalSystems} systems across {sankeyData.origins.length} countries</p>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["sankey","Sankey"],["bar","Bar Chart"],["supplychain","Supply Chain Explorer"],["network","Supplier Network"]].map(([k,l])=>(
            <button key={k} onClick={()=>setViewMode(k)} style={{padding:"8px 16px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",border:"1px solid",background:viewMode===k?"#111":"#fff",color:viewMode===k?"#fff":"#6b7280",borderColor:viewMode===k?"#111":"#e5e7eb",position:"relative"}}>
              {l}
              {k==="supplychain"&&<span style={{position:"absolute",top:-6,right:-6,background:"#f59e0b",color:"#fff",fontSize:7,fontWeight:800,padding:"1px 4px",borderRadius:6,lineHeight:1}}>BETA</span>}
            </button>

      {viewMode==="sankey"&&<>

            <option value="bloc">Alliance Bloc</option>
            <option value="country">Country</option>
            <option value="branch">Branch</option>
            <option value="admin">Administration</option>
            <option value="category">Platform Category</option>
          </select>
          <span style={{fontSize:16,color:"#9ca3af"}}>→</span>
          <span style={{fontSize:13,color:"#374151",fontWeight:600}}>To:</span>
          <select value={sankeyOrder.split("_")[1]||"branch"} onChange={e=>{const v=e.target.value;const l=sankeyOrder.split("_")[0]||"country";setSankeyOrder(l===v?(l==="country"?"bloc":"country")+"_"+v:(l+"_"+v));}} style={{padding:"8px 32px 8px 12px",borderRadius:8,fontSize:13,fontWeight:600,border:"1px solid #e5e7eb",color:"#111",background:"#fff",cursor:"pointer",outline:"none"}}>
            <option value="bloc">Alliance Bloc</option>
            <option value="country">Country</option>
            <option value="branch">Branch</option>
            <option value="admin">Administration</option>

          <span style={{width:1,height:20,background:"#e5e7eb",margin:"0 4px"}}/>

              {l}
              {k==="value"&&<span style={{position:"absolute",top:-6,right:-6,background:"#f59e0b",color:"#fff",fontSize:7,fontWeight:800,padding:"1px 4px",borderRadius:6,lineHeight:1}}>BETA</span>}
            </button>
          ))}
        </div>
        {/* Zoom / Download controls */}
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:600,color:"#374151"}}>Zoom:</span>

            <button key={z} onClick={()=>setSankeyZoom(z)} style={{padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",border:"1px solid",background:sankeyZoom===z?"#111":"#fff",color:sankeyZoom===z?"#fff":"#6b7280",borderColor:sankeyZoom===z?"#111":"#e5e7eb",minWidth:44}}>{z}%</button>

            const svgBlob=new Blob([`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
${svgData}`],{type:"image/svg+xml;charset=utf-8"});

                {/* Right: component nodes */}
                {rPos.map((comp,i)=>(

                    <rect x={colR} y={comp.y} width={nodeW} height={comp.h} rx={4} fill={getCC(comp.country)} opacity={comp.critical?0.85:0.4}/>

                    <div style={{display:"flex",flexDirection:"column",gap:8}}>

                          <div style={{fontSize:12,color:"#6b7280",lineHeight:1.6}}>{p.desc}</div>

                      ))}
                    </div>
                  </div>}
                </>}
              </div>
            );})}
          </div>
      </div>}

  );

    { label: "Fighters", ids: ["KAAN","RAFALE","KF21","SU30","SU27","F16CD","F16AM","F5E","MIG21","HAWK200","M346FA","A4","MIG19","SABRE","MIG17","MIG15","OV10","EMB314","P51"] },
    { label: "Bombers", ids: ["TU16","IL28","B25"] },
    { label: "Trainers", ids: ["T50I","PC24","PC21","HAWK109"] },
    { label: "Transport & ISR", ids: ["A330MRTT","A400M","C130J","CN295","CN235MPA","NC212MPA","C130H","B737"] },
    { label: "Attack Helicopters", ids: ["APACHE","MI35"] },
    { label: "Utility Helicopters", ids: ["BLACKHAWK","H225M","MI17","BELL412","SUPERPUMA","FENNEC","AS565","BELL205","BO105","MI4","GARIB_HELO_T","GARIB_HELO_U"] },
    { label: "UAVs", ids: ["AKINCI","TB3","TB2","ANKAS","CH4","PTPAL_AUV"] },
    { label: "Frigates & Capital Ships", ids: ["BRAWIJAYA","RWFRIGATE","ISTIF","MOGAMI","FREMM","MARTADINATA","MAESTRALE","GARIBALDI","AHMADYANI","SVERDLOV"] },
    { label: "Corvettes", ids: ["BUNGKARNO","DIPONEGORO","BUNGTOMO","FATAHILLAH","PATTIMURA"] },
    { label: "Fast Attack Craft", ids: ["KCR70M","KLEWANG","KCR60","KCR40","MANDAU"] },
    { label: "Amphibious", ids: ["MAKASSAR"] },
    { label: "Submarines", ids: ["SCORPENE","NAGAPASA","CAKRA","WHISKEY"] },
    { label: "Missiles & Launchers", ids: ["BRAHMOS","CAKIR","ATMACA","KHAN","BORA","EXOCET_SHORE","ASTROS","YAKHONT","C705"] },
    { label: "Air Defense", ids: ["SIPER","NASAMS","HISARO","SKYSHIELD","MISTRAL","STARSTREAK","QW3"] },
    { label: "Radar", ids: ["GM400","CZECH_RADAR","GM200","MASTERT","TRS2215","AR325"] },
    { label: "Main Battle Tanks", ids: ["LEO2","LEO2RI"] },
    { label: "Medium & Light Tanks", ids: ["HARIMAU","AMX10PAC","SCORPION90","AMX13"] },
    { label: "IFVs & APCs", ids: ["PANDUR","MARDER","BMP3F","BVP2","ANOA","BADAK","KOMODO","MAUNG"] },
    { label: "Artillery", ids: ["CAESAR","KH179","M109","RM70"] },
    { label: "Anti-Tank", ids: ["JAVELIN"] },
  ];

  const admins = [
    { name: "Soekarno", start: 1945, end: 1966, color: "#05966918", textColor: "#059669" },
    { name: "Suharto", start: 1966, end: 1998, color: "#eab30835", textColor: "#ca8a04" },
    { name: "Reform Era", start: 1998, end: 2004, color: "#6b728028", textColor: "#6b7280" },
    { name: "Yudhoyono (SBY)", start: 2004, end: 2014, color: "#3b82f628", textColor: "#2563eb" },
    { name: "Jokowi", start: 2014, end: 2024, color: "#ef444428", textColor: "#dc2626" },
    { name: "Prabowo", start: 2024, end: 2030, color: "#7dd3fc30", textColor: "#38bdf8" },
  ];

  const sysMap = useMemo(() => {
    const m = {};
    WEAPON_SYSTEMS.forEach(w => { m[w.id] = w; });
    return m;
  }, []);

  // Build rows: group label rows + system rows
  const rows = useMemo(() => {
    const result = [];
    GROUPS.forEach(g => {
      result.push({ type: "group", label: g.label });
      const items = g.ids.map(id => {
        const w = sysMap[id];
        const cy = CONTRACT_YEARS[id];
        if (!w || !cy) return null;
        const introMatch = String(w.specs.introduced || "").match(/\d{4}/);
        const introYear = introMatch ? parseInt(introMatch[0]) : null;
        const retiredYear = w.specs.retired || null;
        const isRetired = w.status === "Retired";
        return { type: "system", id, w, cy, introYear, retiredYear, isRetired };
      }).filter(Boolean);
      // Keep GROUPS order (technology tier) — do NOT re-sort by cy
      items.forEach(item => result.push(item));
    });
    return result;
  }, [sysMap]);

  const [tlBranch, setTlBranch] = useState("All");
  const [tlYearFrom, setTlYearFrom] = useState(1945);
  const [tlYearTo, setTlYearTo] = useState(2030);

  const minY = tlYearFrom, maxY = tlYearTo;
  const pctX = (year) => ((year - minY) / (maxY - minY)) * 100;

  // Filter rows by branch AND year range
  const filteredRows = useMemo(() => {
    let filtered = rows;
    if (tlBranch !== "All") {
      filtered = filtered.filter(r => {
        if (r.type === "group") return true;
        return r.w.branch === tlBranch;
      });
    }
    // Filter by year range
    filtered = filtered.filter(r => {
      if (r.type === "group") return true;
      return r.cy >= tlYearFrom && r.cy <= tlYearTo;
    });
    // Remove empty group headers
    filtered = filtered.filter((r, i, arr) => {
      if (r.type === "group") {
        const next = arr[i + 1];
        return next && next.type === "system";
      }
      return true;
    });
    return filtered;
  }, [rows, tlBranch, tlYearFrom, tlYearTo]);

  // Admin summary stats
  const adminStats = useMemo(() => {
    const allSystems = rows.filter(r => r.type === "system" && (tlBranch === "All" || r.w.branch === tlBranch) && r.cy >= tlYearFrom && r.cy <= tlYearTo);
    return admins.filter(a => a.end > tlYearFrom && a.start < tlYearTo).map(a => {
      const systems = allSystems.filter(r => r.cy >= a.start && r.cy < a.end);
      // Sum known contract values
      let knownValue = 0;
      let hasValue = false;
      systems.forEach(r => {
        const cv = CONTRACT_VALUES[r.id];
        if (cv) {
          const match = cv.match(/\\$([\\.\\d]+)B/);
          if (match) { knownValue += parseFloat(match[1]); hasValue = true; }
        }
      });
      return { ...a, count: systems.length, knownValue: hasValue ? knownValue : null, stalled: systems.filter(r => !r.introYear).length };
    });
  }, [rows, tlBranch, tlYearFrom, tlYearTo]);

  const rowH = 22;
  const groupH = 28;
  const totalH = filteredRows.reduce((h, r) => h + (r.type === "group" ? groupH : rowH), 0) + 40;

  return (
    <div style={{ marginTop: 36 }}>
      <h2 style={{ fontSize: 26, fontWeight: 800, color: "#111", marginBottom: 6 }}>Procurement Timeline</h2>
      <p style={{ fontSize: 14, color: "#9ca3af", marginBottom: 8 }}>Year of contract/order signing by presidential administration</p>

      {/* Admin summary stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(min(180px,100%), 1fr))", gap: 8, marginBottom: 16 }}>
        {adminStats.map(a => (
          <div key={a.name} style={{ padding: "10px 14px", borderRadius: 8, background: a.color.replace(/15$/, "30").replace(/18$/, "30").replace(/20$/, "30"), border: `1px solid ${a.textColor}25` }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: a.textColor, letterSpacing: ".5px", textTransform: "uppercase", marginBottom: 2 }}>{a.name}</div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
              <span style={{ fontSize: 28, fontWeight: 800, color: a.textColor, lineHeight: 1 }}>{a.count}</span>
              <span style={{ fontSize: 11, color: "#6b7280" }}>systems ordered</span>
            </div>
            {(a.knownValue || a.stalled > 0) && <div style={{ marginTop: 4 }}>
              {a.knownValue && <div style={{ fontSize: 11, color: a.textColor, fontWeight: 600 }}>~${a.knownValue.toFixed(1)}B known value</div>}
              {a.stalled > 0 && <div style={{ fontSize: 10, color: "#f59e0b" }}>{a.stalled} awaiting delivery</div>}
            </div>}
          </div>
        ))}
      </div>

      {/* Branch filter + year range + legend */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 12, color: "#6b7280", fontWeight: 600 }}>Branch:</span>
        {["All", "TNI AU", "TNI AD", "TNI AL"].map(b => (
          <button key={b} onClick={() => setTlBranch(b)} style={{
            padding: "5px 14px", borderRadius: 12, fontSize: 12, fontWeight: 600, cursor: "pointer",
            border: tlBranch === b ? `1px solid ${b === "All" ? "#C8A951" : BCo[b]}` : "1px solid #e5e7eb",
            background: tlBranch === b ? (b === "All" ? "#C8A95118" : BCo[b] + "18") : "#fff",
            color: tlBranch === b ? (b === "All" ? "#C8A951" : BCo[b]) : "#6b7280",
          }}>{b}</button>
        ))}
        <span style={{ width: 1, height: 20, background: "#e5e7eb", margin: "0 4px" }} />
        <span style={{ fontSize: 12, color: "#6b7280", fontWeight: 600 }}>Years:</span>
        <select value={tlYearFrom} onChange={e => { const v = parseInt(e.target.value); setTlYearFrom(v); if (v >= tlYearTo) setTlYearTo(Math.min(v + 10, 2030)); }}
          style={{ padding: "4px 8px", borderRadius: 8, fontSize: 12, fontWeight: 600, border: "1px solid #e5e7eb", color: "#374151", background: "#fff", cursor: "pointer" }}>
          {Array.from({length: 2030 - 1945 + 1}, (_, i) => 1945 + i).filter(y => y < tlYearTo).map(y => <option key={y} value={y}>{y}</option>)}
        </select>
        <span style={{ fontSize: 12, color: "#9ca3af" }}>to</span>
        <select value={tlYearTo} onChange={e => { const v = parseInt(e.target.value); setTlYearTo(v); if (v <= tlYearFrom) setTlYearFrom(Math.max(v - 10, 1945)); }}
          style={{ padding: "4px 8px", borderRadius: 8, fontSize: 12, fontWeight: 600, border: "1px solid #e5e7eb", color: "#374151", background: "#fff", cursor: "pointer" }}>
          {Array.from({length: 2030 - 1945 + 1}, (_, i) => 1945 + i).filter(y => y > tlYearFrom).map(y => <option key={y} value={y}>{y}</option>)}
        </select>
        {(tlYearFrom !== 1945 || tlYearTo !== 2030) && <button onClick={() => { setTlYearFrom(1945); setTlYearTo(2030); }}
          style={{ padding: "4px 10px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer", border: "1px solid #e5e7eb", background: "#f9fafb", color: "#6b7280" }}>Reset</button>}
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 11, color: "#9ca3af" }}>●</span>
        <span style={{ fontSize: 11, color: "#9ca3af" }}> contract year</span>
        <span style={{ fontSize: 11, color: "#C8A951", marginLeft: 8 }}>→ delivery</span>
        <span style={{ fontSize: 11, color: "#78716c", marginLeft: 8 }}>┄ retired service life</span>
        <span style={{ fontSize: 11, color: "#f59e0b", marginLeft: 8 }}>⊘ no delivery date</span>
      </div>

      <div style={{ position: "relative", paddingBottom: 8 }}>
        {/* Sticky group labels overlay */}
        <div style={{ position: "absolute", left: 0, top: 0, zIndex: 20, pointerEvents: "none" }}>
          {(() => {
            let y = 30;
            return filteredRows.map((row, i) => {
              if (row.type === "group") {
                const el = <div key={`gl-${i}`} style={{ position: "absolute", left: 4, top: y, height: groupH, display: "flex", alignItems: "center" }}>
                  <span style={{ fontSize: 12, fontWeight: 800, color: "#374151", background: "#f9fafbe8", padding: "2px 8px", borderRadius: 4, border: "1px solid #e5e7eb", whiteSpace: "nowrap", boxShadow: "2px 0 8px rgba(0,0,0,.08)", pointerEvents: "auto" }}>{row.label}</span>
                </div>;
                y += groupH;
                return el;
              }
              y += rowH;
              return null;
            });
          })()}
        </div>
        {/* Scrollable timeline */}
        <div style={{ overflowX: "auto", paddingBottom: 8 }}>
        <div style={{ position: "relative", minWidth: 950, height: totalH }}>
          {/* Admin era bands */}
          {admins.filter(a => a.end > minY && a.start < maxY).map(a => {
            const clampStart = Math.max(a.start, minY);
            const clampEnd = Math.min(a.end, maxY);
            return (
            <div key={a.name} style={{ position: "absolute", left: `${pctX(clampStart)}%`, width: `${pctX(clampEnd) - pctX(clampStart)}%`, top: 0, bottom: 0, background: a.color, borderLeft: clampStart > minY ? `2px solid ${a.textColor}30` : "none" }}>
              <span style={{ position: "absolute", top: 2, left: 6, fontSize: 13, color: a.textColor, fontWeight: 800, opacity: 0.85, letterSpacing: ".3px" }}>{a.name}</span>
            </div>
            );
          })}
          {/* Decade markers */}
          {Array.from({length: Math.ceil((maxY - minY) / 10) + 1}, (_, i) => Math.floor(minY / 10) * 10 + i * 10).filter(d => d >= minY && d <= maxY).map(d => (
            <div key={d} style={{ position: "absolute", left: `${pctX(d)}%`, top: 16, bottom: 0, borderLeft: "1px dashed #d1d5db40", zIndex: 0 }}>
              <span style={{ position: "absolute", top: 0, left: 4, fontSize: 11, color: "#9ca3af", fontWeight: 600 }}>{d}</span>
            </div>
          ))}
          {/* Rows */}
          {(() => {
            let y = 30;
            return filteredRows.map((row, i) => {
              if (row.type === "group") {
                y += groupH;
                return null;
              } else {
                const c = BCo[row.w.branch] || "#64748b";
                const isStalled = !row.introYear && row.cy < 2025;
                const isTBD = !row.introYear;
                const isRetired = row.isRetired;
                const startYear = row.introYear || null;
                const endYear = isRetired ? row.retiredYear : null;
                const barStartPct = (isRetired && startYear) ? pctX(startYear) : null;
                const barEndPct = (isRetired && endYear) ? pctX(Math.min(endYear, maxY)) : null;
                const barWidthPct = (barStartPct !== null && barEndPct !== null) ? (barEndPct - barStartPct) : 0;

                const el = <div key={row.id} style={{ position: "absolute", left: 0, right: 0, top: y, height: rowH, zIndex: 1 }}>
                  {/* Lifespan bar — retired systems only */}
                  {isRetired && barWidthPct > 0 && (
                    <div style={{
                      position: "absolute",
                      left: `${barStartPct}%`,
                      width: `${barWidthPct}%`,
                      top: rowH / 2 - 5,
                      height: 10,
                      background: c + "18",
                      border: `1px dashed ${c}50`,
                      borderRadius: 3,
                    }} />
                  )}
                  {/* Contract year dot */}
                  <div style={{
                    position: "absolute",
                    left: `${pctX(row.cy)}%`,
                    top: rowH / 2 - 4,
                    width: 7,
                    height: 7,
                    borderRadius: 4,
                    background: c,
                    border: "1.5px solid #fff",
                    boxShadow: "0 1px 2px rgba(0,0,0,.12)",
                    zIndex: 2,
                    marginLeft: -3,
                  }} />
                  {/* Label */}
                  <span style={{
                    position: "absolute",
                    left: `${pctX(row.cy) + 1}%`,
                    top: 0,
                    height: rowH,
                    display: "flex",
                    alignItems: "center",
                    fontSize: 11,
                    color: isRetired ? "#9ca3af" : (isStalled ? "#f59e0b" : "#374151"),
                    fontWeight: 500,
                    whiteSpace: "nowrap",
                    fontStyle: isRetired ? "italic" : "normal",
                  }}>
                    {row.w.name.split("(")[0].trim()}
                    {isRetired && startYear && <span style={{ fontSize: 10, color: "#9ca3af", marginLeft: 4 }}>{startYear}–{row.retiredYear}</span>}
                    {!isRetired && startYear && startYear !== row.cy && <span style={{ fontSize: 10, color: "#C8A951", marginLeft: 4 }}>{"\u2192 "}{startYear}</span>}
                    {isTBD && <span style={{ fontSize: 10, color: "#f59e0b", fontWeight: 500 }}>{" \u2298"}</span>}
                  </span>
                </div>;
                y += rowH;
                return el;
              }
            });
          })()}
        </div>
      </div>
      </div>
    </div>
  );
}

  // D3 projection for Indonesia - zoomed out to show regional context
  const projection = useMemo(() => {
    return d3.geoMercator()
      .center([118, -4])
      .scale(1050)
      .translate([mapW / 2, mapH / 2]);
  }, []);

  // GeoJSON feature for Indonesia
  const idnFeature = useMemo(() => ({
    type: "Feature",
    properties: { name: "Indonesia" },
    geometry: { type: "MultiPolygon", coordinates: IDN_GEO }
  }), []);

  // Generate SVG path for Indonesia
  const pathGen = useMemo(() => d3.geoPath().projection(projection), [projection]);
  const idnPath = useMemo(() => pathGen(idnFeature), [pathGen, idnFeature]);

  // Neighbor country paths
  const neighborPaths = useMemo(() => {
    return Object.entries(NEIGHBORS).map(([name, polygons]) => {
      const feature = {
        type: "Feature",
        properties: { name },
        geometry: { type: "MultiPolygon", coordinates: polygons.map(ring => [ring]) }
      };
      const centroid = d3.geoCentroid(feature);
      const projected = projection(centroid);
      return { name, path: pathGen(feature), cx: projected ? projected[0] : 0, cy: projected ? projected[1] : 0 };
    });
  }, [pathGen, projection]);

      bases.forEach(baseName => {
        const coord = BASE_COORDS[baseName];
        if (!coord) return;
        if (!baseMap[baseName]) {
          baseMap[baseName] = {
            name: baseName,
            lat: coord[0],
            lng: coord[1],
            systems: [],
            branches: new Set(),
          };
        }
        baseMap[baseName].systems.push(w);
        baseMap[baseName].branches.add(w.branch);
      });
    });
    return Object.values(baseMap).map(b => {
      const projected = projection([b.lng, b.lat]);
      const branchArr = [...b.branches];
      return {
        ...b,
        x: projected ? projected[0] : 0,
        y: projected ? projected[1] : 0,
        primaryBranch: branchArr.length === 1 ? branchArr[0] : (branchArr.includes("TNI AL") ? "TNI AL" : branchArr[0]),
        branchArr,

        const center = projection([coord[1], coord[0]]);

      if (t === 40) return b.tiers.some(bt => bt !== 21); // air defence / strike: anywhere except sub-only
      if (t === 22) return b.tiers.includes(22);
      return b.tiers.includes(t);
    });
  }, [plannerSelectedAC]);
  const plannerSelectedBase = useMemo(() => plannerBase ? PLANNER_BASES.find(b=>b.name===plannerBase) : null, [plannerBase]);
  const plannerFilteredAC = useMemo(() => PLANNER_AIRCRAFT.filter(a=>a.cat===plannerCat && (plannerShowAspi || !a.aspirational)), [plannerCat, plannerShowAspi]);

  // Command groupings for connection lines
  const COMMAND_GROUPS = {

    "Koarmada II": ["Koarmada II, Surabaya", "PT PAL, Surabaya", "Puspenerbal, Juanda", "Brigif Marinir 1, Surabaya", "Lantamal V, Surabaya"],
    "Koarmada III": ["Koarmada III, Sorong"],
    "Koopsau I": ["Lanud Halim Perdanakusuma, Jakarta", "Lanud Roesmin Nurjadin, Pekanbaru", "Lanud Supadio, Pontianak", "Lanud Atang Sendjaja, Bogor", "Lanud Husein Sastranegara, Bandung"],
    "Koopsau II": ["Lanud Iswahjudi, Madiun", "Lanud Sultan Hasanuddin, Makassar", "Lanud Abdulrachman Saleh, Malang", "Lanud El Tari, Kupang", "Lanud Sam Ratulangi, Manado"],
    "Puspenerbad": ["Puspenerbad, Semarang", "Puspenerbad, Pondok Cabe", "Skadron 12 Penerbad, Lampung"],
  };

  // Get sibling bases under same command
  const commandSiblings = useMemo(() => {
    if (!selectedBase) return [];
    const siblings = [];
    Object.entries(COMMAND_GROUPS).forEach(([cmd, bases]) => {
      if (bases.includes(selectedBase.name)) {
        bases.forEach(bn => {
          if (bn !== selectedBase.name) {
            const coord = BASE_COORDS[bn];
            if (coord) {
              const p = projection([coord[1], coord[0]]);
              if (p) siblings.push({ name: bn, x: p[0], y: p[1], command: cmd });
            }
          }
        });
      }
    });
    return siblings;
  }, [selectedBase, projection]);

  const unlocatedSystems = useMemo(() => {
    return WEAPON_SYSTEMS.filter(w => {
      const bases = SYSTEM_BASES[w.id] || [];
      return bases.length === 0;
    });
  }, []);

  // Graticule
  const graticule = useMemo(() => {
    const g = d3.geoGraticule().step([5, 5]);
    return pathGen(g());

  // ALKI route paths
  const alkiPaths = useMemo(() => {

      const mid = points[Math.floor(points.length / 2)];
      return { ...route, path: pathStr, labelX: mid ? mid[0] : 0, labelY: mid ? mid[1] : 0 };

  }, [projection]);

  const eezPath = useMemo(() => {

          </button>

      {baseMapMode==="current"&&<>

        </div>
      </div>

      {/* Radius overlay controls */}
      <div style={{ background: "linear-gradient(135deg, #111827 0%, #0f172a 100%)", borderRadius: 10, padding: "14px 20px", marginBottom: 12, border: "1px solid #C8A95130", boxShadow: "0 2px 12px rgba(200,169,81,0.08)" }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: 12, color: "#C8A951", fontWeight: 700, marginRight: 8, letterSpacing: "1px", textTransform: "uppercase", borderRight: "2px solid #C8A95140", paddingRight: 12 }}>{"⊕"} Range Rings</span>
          {[["combat","Combat"],["ferry","Ferry / Max"]].map(([m,l])=>(
            <button key={m} onClick={()=>setRadiusMode(m)} style={{padding:"6px 12px",borderRadius:16,fontSize:11,fontWeight:700,cursor:"pointer",border:radiusMode===m?"1px solid #f59e0b":"1px solid #374151",background:radiusMode===m?"#f59e0b20":"#111827",color:radiusMode===m?"#f59e0b":"#64748b",marginRight:m==="ferry"?8:0,transition:"all .2s"}}>{l}</button>

          <span style={{width:1,height:20,background:"#374151",marginRight:8}}/>

        </div>
        {showRadius.size > 0 && <div style={{ fontSize: 11, color: "#6b8bb5", marginTop: 10, paddingTop: 10, borderTop: "1px solid #1e3a5f" }}>
          Showing {radiusRings.length} {radiusMode === "ferry" ? "ferry/max" : "combat"} range ring{radiusRings.length !== 1 ? "s" : ""} across {showRadius.size} categor{showRadius.size !== 1 ? "ies" : "y"}{radiusRings.some(r => r.clamped) ? " (short-range enlarged for visibility)" : ""}
        </div>}
        {showRadius.size === 0 && <div style={{ fontSize: 11, color: "#4a5568", marginTop: 8, fontStyle: "italic" }}>
          Select one or more categories to overlay range circles. Or click a weapon in a base detail panel.
        </div>}
        {/* Strategic overlays - always on */}

          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{width:12,height:2,background:"#f59e0b",display:"inline-block"}}/>  <span style={{color:"#f59e0b"}}>ALKI Sea Lanes</span></span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{width:12,height:2,background:"#3b82f6",display:"inline-block",borderTop:"1px dashed #3b82f6"}}/>  <span style={{color:"#3b82f6"}}>EEZ Boundary</span></span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span>{"\uD83D\uDCA5"}</span> <span style={{color:"#ef4444"}}>Potential Flashpoints</span></span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span>{"\u2694\uFE0F"}</span> <span style={{color:"#fbbf24"}}>Border Disputes</span></span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span>{"\u26CF\uFE0F"}</span> <span style={{color:"#f97316"}}>Mining Sites (amphibious-vulnerable)</span></span>
          <span style={{ color: "#64748b", fontStyle: "italic", fontSize: 10, marginLeft: 8, borderLeft: "1px solid #334155", paddingLeft: 8 }}>ALKI routes & EEZ boundary are approximate — work in progress</span>

          <button onClick={() => setZoomLevel(z => Math.max(z / 1.4, 0.5))} style={{ width: 32, height: 32, borderRadius: 6, border: "1px solid #2a5080", background: "#0d1f3c", color: "#8ba4c4", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>

          onWheel={(e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.85 : 1.18;
            setZoomLevel(z => Math.min(Math.max(z * delta, 0.5), 15));
          }}
          onMouseDown={(e) => {
            e.preventDefault();
            const startX = e.clientX, startY = e.clientY;
            const startPan = [...panOffset];
            const onMove = (ev) => {
              const dx = (ev.clientX - startX) / zoomLevel * 0.8;
              const dy = (ev.clientY - startY) / zoomLevel * 0.8;
              setPanOffset([startPan[0] + dx, startPan[1] + dy]);
            };
            const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
          }}
          onTouchStart={(e) => {
            if (e.touches.length === 1) {
              const t = e.touches[0];
              const startX = t.clientX, startY = t.clientY;
              const startPan = [...panOffset];
              const onMove = (ev) => {
                ev.preventDefault();
                const dx = (ev.touches[0].clientX - startX) / zoomLevel * 0.8;
                const dy = (ev.touches[0].clientY - startY) / zoomLevel * 0.8;
                setPanOffset([startPan[0] + dx, startPan[1] + dy]);
              };
              const onEnd = () => { window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
              window.addEventListener("touchmove", onMove, { passive: false });
              window.addEventListener("touchend", onEnd);
            } else if (e.touches.length === 2) {
              const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
              const startZoom = zoomLevel;
              const onMove = (ev) => {
                ev.preventDefault();
                if (ev.touches.length < 2) return;
                const newDist = Math.hypot(ev.touches[0].clientX - ev.touches[1].clientX, ev.touches[0].clientY - ev.touches[1].clientY);
                setZoomLevel(Math.min(Math.max(startZoom * (newDist / dist), 0.5), 15));
              };
              const onEnd = () => { window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
              window.addEventListener("touchmove", onMove, { passive: false });
              window.addEventListener("touchend", onEnd);
            }
          }}>

            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
            <filter id="dotGlow">
              <feGaussianBlur stdDeviation="2" result="blur" />
              <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
          <rect x="-2000" y="-2000" width="6000" height="6000" fill="url(#ocean)" />

          {/* ALKI Sea Lanes */}
          {showALKI && alkiPaths.map((route, i) => (
            <g key={`alki-${i}`}>
              <path d={route.path} fill="none" stroke={route.color} strokeWidth="2" strokeDasharray="10,5" opacity="0.6" strokeLinecap="round" />
              <path d={route.path} fill="none" stroke={route.color} strokeWidth="6" opacity="0.08" strokeLinecap="round" />
              <text x={route.labelX + 8} y={route.labelY - 6} fill={route.color} fontSize="8" fontWeight="700" opacity="0.85">{route.name}</text>
            </g>
          ))}

          {/* Neighbor countries */}
          {neighborPaths.map(n => (
            <g key={n.name}>
              <path d={n.path} fill="#0e1a2e" stroke="#1a2d4a" strokeWidth="0.4" />
              <text x={n.cx} y={n.cy} textAnchor="middle" fill="#1a2d4a" fontSize="7" fontWeight="600" letterSpacing="1.5" style={{ textTransform: "uppercase" }}>{n.name}</text>
            </g>
          ))}

          {/* Indonesia landmass */}
          <path d={idnPath} fill="#162a46" stroke="#2a5080" strokeWidth="0.6" />
          <path d={idnPath} fill="none" stroke="#3a6a9f" strokeWidth="0.2" opacity="0.4" />

          {/* Sea & Strait labels */}
          {[
            [105.5,-6.8,"Sunda Strait",8],
            [115.8,-8.8,"Lombok Strait",7],
            [117.5,-3,"Makassar Strait",7],
            [124,-8.5,"Ombai Strait",6],
            [128,-7.5,"Banda Sea",8],
            [120,-5,"Flores Sea",7],
            [110,-5.5,"Java Sea",8],
            [108,3,"South China Sea",9],
            [118,7,"Sulu Sea",7],
            [130,1,"Pacific Ocean",9],
            [100,-8,"Indian Ocean",9],
            [135,-4,"Arafura Sea",7],
            [126,-3,"Molucca Sea",7],
            [120,-1.5,"Celebes Sea",7],
            [133,-9.5,"Timor Sea",7],
          ].map(([lon,lat,name,size],i)=>{
            const p=projection([lon,lat]);
            return p?<text key={`sea-${i}`} x={p[0]} y={p[1]} textAnchor="middle" fill="#1e3a5f" fontSize={size||7} fontWeight="600" fontStyle="italic" opacity="0.5" letterSpacing="2" style={{pointerEvents:"none"}}>{name}</text>:null;
          })}

          {/* Potential flashpoints (💥) */}
          {[
            {coords:[107,7],label:"SCS / Natuna"},
            {coords:[121,5.5],label:"Sulu Sea"},
            {coords:[134,1.5],label:"N. Papua / Pacific"},
            {coords:[131,-10.5],label:"Timor Sea"},
            {coords:[115,-12],label:"Indian Ocean S."},
            {coords:[104,-8],label:"Sunda Strait"},
          ].map((fp,i)=>{

              <text x={p[0]} y={p[1]+5} textAnchor="middle" fontSize="18" opacity="0.85" style={{cursor:"default"}}>{"\uD83D\uDCA5"}</text>
            </g>;
          })}

          {/* Historical border disputes (⚔️) */}
          {[
            {coords:[108.0,5.5],label:"North Natuna Sea",desc:"vs China (coast guard standoffs)"},
            {coords:[118.4,2.15],label:"Ambalat Block",desc:"vs Malaysia (maritime boundary)"},
            {coords:[118.63,4.11],label:"Sipadan & Ligitan",desc:"vs Malaysia (ICJ 2002 — ruled for MY)"},
          ].map((bd,i)=>{
            const p=projection(bd.coords);
            if(!p)return null;
            return <g key={`bd-${i}`}>
              <text x={p[0]} y={p[1]+5} textAnchor="middle" fontSize="17" opacity="0.9" style={{cursor:"default"}}>{"\u2694\uFE0F"}</text>
              <text x={p[0]+12} y={p[1]+2} fontSize="7" fill="#fbbf24" fontWeight="600" opacity="0.85">{bd.label}</text>
              <text x={p[0]+12} y={p[1]+9} fontSize="5.5" fill="#94a3b8" opacity="0.7">{bd.desc}</text>
            </g>;
          })}

          {/* Key mining sites (⛏️) — amphibious vulnerability per LAB45 analysis */}
          {[
            {coords:[106.1,-2.1],label:"Bangka Belitung",desc:"Tin — highly favorable landing",tier:"high"},
            {coords:[104.6,1.05],label:"Bintan",desc:"Bauxite — highly favorable landing",tier:"high"},

              <text x={p[0]+11} y={p[1]+2} fontSize="6.5" fill={ms.tier==="high"?"#f97316":"#d97706"} fontWeight="600" opacity="0.85">{ms.label}</text>

              {!ring.clamped && <circle cx={ring.cx} cy={ring.cy} r={ring.r * 0.5} fill="none" stroke={ring.color} strokeWidth="0.4" strokeDasharray="2,4" opacity="0.3" />}

          {filteredMarkers.map((b, i) => {
            const isSelected = sel && sel.name === b.name;
            const isHovered = hov === i;
            const c = BCo[b.primaryBranch] || "#64748b";
            const baseR = isSelected ? 10 : isHovered ? 9 : Math.min(5.5 + b.systems.length * 0.6, 10);
            const r = baseR / Math.sqrt(zoomLevel); // shrink dots when zoomed in
            return (
              <g key={b.name}
                onMouseEnter={() => setHoveredBase(i)}
                onMouseLeave={() => setHoveredBase(null)}
                onClick={(e) => { e.stopPropagation(); setSelectedBase(isSelected ? null : b); setSelectedWeapon(null); }}
                style={{ cursor: "pointer" }}>
                {/* Pulse ring for selected */}
                {isSelected && <circle cx={b.x} cy={b.y} r={18 / Math.sqrt(zoomLevel)} fill="none" stroke="#C8A951" strokeWidth={1.5 / Math.sqrt(zoomLevel)} opacity="0.6">
                  <animate attributeName="r" from={12 / Math.sqrt(zoomLevel)} to={24 / Math.sqrt(zoomLevel)} dur="1.5s" repeatCount="indefinite" />
                  <animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite" />
                </circle>}
                {/* Outer glow */}
                <circle cx={b.x} cy={b.y} r={r + 3 / Math.sqrt(zoomLevel)} fill={c} opacity="0.15" filter="url(#dotGlow)" />
                {/* Main dot */}
                <circle cx={b.x} cy={b.y} r={r} fill={c} stroke={isSelected ? "#C8A951" : "#fff"} strokeWidth={(isSelected ? 2.5 : 1.5) / Math.sqrt(zoomLevel)}
                  opacity={isSelected ? 1 : isHovered ? 1 : 0.85}
                  style={{ transition: "r 0.2s, opacity 0.2s" }} />
                {/* System count label */}
                {(isHovered || isSelected) && b.systems.length > 1 && (
                  <text x={b.x} y={b.y + 1} textAnchor="middle" dominantBaseline="middle"
                    fill="#fff" fontSize={9 / Math.sqrt(zoomLevel)} fontWeight="700" style={{ pointerEvents: "none" }}>
                    {b.systems.length}
                  </text>
                )}
              </g>
            );
          })}

          {hov !== null && !sel && (() => {

            const tw = Math.max(180, b.name.length * 5.5 + 30);

            const ty = Math.max(10, Math.min(b.y - 30, mapH - 70));

                </div>
                <button onClick={() => { setSelectedBase(null); setSelectedWeapon(null); }}

              </div>

                {sel.branchArr.map(br => (

                ))}

            </div>

            {/* Compact mode: show only selected weapon */}
            {selectedWeapon && (() => {

                  <div style={{ display: "flex", gap: 8, marginTop: 4, fontSize: 10, color: "#4a7099" }}>
                    <span>{w.origin}</span><span>Qty: {w.quantity}</span>
                  </div>
                  <button onClick={() => setSelectedWeapon(null)}
                    style={{ marginTop: 8, padding: "4px 10px", borderRadius: 5, fontSize: 10, fontWeight: 600, cursor: "pointer", border: "1px solid #2a5080", background: "#1e3a5f", color: "#8ba4c4" }}>

            ))}
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>{setPlannerShowAspi(!plannerShowAspi);setPlannerAircraft(null);setPlannerBase(null);}} style={{padding:"8px 16px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",border:"1px solid",letterSpacing:".3px",background:plannerShowAspi?"rgba(6,182,212,0.15)":"rgba(255,255,255,0.03)",color:plannerShowAspi?"#06b6d4":"#64748b",borderColor:plannerShowAspi?"#06b6d4":"rgba(255,255,255,0.1)"}}>

              </button>
            </div>
          </div>

          {/* Aircraft selector */}
          <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>1. Select System</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(260px,100%),1fr))",gap:8,marginBottom:20}}>
            {filteredAC.map(ac=>{
              const isSel=plannerAircraft===ac.id;
              const isAspi=ac.aspirational;
              const accentColor=isAspi?"#06b6d4":"#f59e0b";
              return(
                <div key={ac.id} onClick={()=>{setPlannerAircraft(isSel?null:ac.id);setPlannerBase(null);}} style={{padding:"12px 14px",borderRadius:10,cursor:"pointer",background:isSel?(isAspi?"rgba(6,182,212,0.15)":"rgba(245,158,11,0.15)"):"rgba(255,255,255,0.05)",border:`1px ${isAspi?"dashed":"solid"} ${isSel?accentColor:"rgba(255,255,255,0.1)"}`,transition:"all .2s"}}>

                    <span style={{fontSize:14,fontWeight:700,color:isSel?accentColor:"#e2e8f0"}}>{isAspi&&"\u25c7 "}{ac.name}</span>
                    <span style={{fontSize:10,fontWeight:600,color:isAspi?"#06b6d4":"#94a3b8",background:isAspi?"rgba(6,182,212,0.1)":"rgba(255,255,255,0.1)",padding:"2px 8px",borderRadius:4}}>{ac.radius} km</span>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center"}}>
